<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NORTH PINE カレンダー</title>
  <meta name="description" content="NORTH PINEの練習日程・参加者一覧（当月・来月・19:15～21:45）" />
  <meta property="og:title" content="NORTH PINE カレンダー" />
  <meta property="og:description" content="練習日程と参加者状況を確認できます（当月・来月）" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="NORTH PINE カレンダー" />
  <meta name="twitter:description" content="練習日程と参加者状況を確認できます" />
  <meta
    name="gas-web-app-url"
    content="https://script.google.com/macros/s/AKfycbwN-Fi6SwzM2bp3WW_OmJ7kGNSU3Vl3_n77JmJ2e8IcDZqUl5tvJJytD7RLs5Y96dB2/exec"
  />
  <link rel="stylesheet" href="calendar.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body class="cyber-cal">
  <header>
    <div class="header-top">
      <div class="header-brand">
        <img
          class="header-brand-img"
          src="NORTHPINE_背景なし.png"
          alt="NORTH PINE"
          width="512"
          height="512"
          decoding="async"
        />
        <h1 class="visually-hidden">NORTH PINE カレンダー</h1>
        <p id="periodLabel" class="subtitle">読み込み中…</p>
      </div>
      <button type="button" id="btnRefresh" class="btn-refresh" title="スプレッドシートから再取得">
        更新
      </button>
    </div>
    <div class="header-action-bar">
      <a
        href="https://www.instagram.com/sapporo_northpine?igsh=cWp4OHA4ejlzb3Np"
        class="btn-header-link btn-header-link--instagram"
        target="_blank"
        rel="noopener noreferrer"
      >Instagram (参加連絡はこちら)</a>
      <a
        href="https://www.youtube.com/playlist?list=PL_vW5rmDDp-GFSQ8oeXUD_171uDtn1Bqg"
        class="btn-header-link btn-header-link--youtube"
        target="_blank"
        rel="noopener noreferrer"
      >YouTube</a>
    </div>
    <noscript>
      <p style="margin:0.5rem 0 0;font-size:0.85rem;">JavaScriptを有効にすると日程が表示されます。</p>
    </noscript>
  </header>

  <main>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="errorArea"></div>
    <div id="loadingArea" class="loading-panel" role="status" aria-live="polite">
      <div class="loading-snowflakes" aria-hidden="true">
        <span class="loading-snowflakes__flake loading-snowflakes__flake--sm">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 3v18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4M3 12h18M8 8l2 2M16 8l-2 2M8 16l2-2M16 16l-2-2"/>
          </svg>
        </span>
        <span class="loading-snowflakes__flake loading-snowflakes__flake--lg">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 3v18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4M3 12h18M8 8l2 2M16 8l-2 2M8 16l2-2M16 16l-2-2"/>
          </svg>
        </span>
        <span class="loading-snowflakes__flake loading-snowflakes__flake--sm">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M12 3v18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4M3 12h18M8 8l2 2M16 8l-2 2M8 16l2-2M16 16l-2-2"/>
          </svg>
        </span>
      </div>
      <span class="visually-hidden">読み込み中</span>
    </div>
    <div id="calendarArea" class="calendars" style="display:none;"></div>
  </main>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal modal--lineup" role="dialog" aria-labelledby="modalTitle">
      <div id="modalLoading" class="modal-loading modal-loading--lineup" role="status" aria-live="polite">
        <div class="loading-spinner loading-spinner--lineup" aria-hidden="true"></div>
        <span>読み込み中…</span>
      </div>
      <button type="button" class="lineup-close" id="closeModalBtn" aria-label="閉じる">&times;</button>
      <div class="lineup-scene">
        <header class="lineup-header">
          <div class="lineup-header-main">
            <div class="lineup-date-block" aria-labelledby="modalTitle">
              <span id="modalDateYear" class="lineup-year"></span>
              <div class="lineup-date-line">
                <span id="modalDateMain" class="lineup-date-main"></span>
                <span id="modalDateDow" class="lineup-date-dow"></span>
                <span id="modalTimeSlot" class="lineup-time-slot"></span>
              </div>
              <h2 id="modalTitle" class="visually-hidden">日程詳細</h2>
            </div>
            <div id="modalPlace" class="lineup-venue"></div>
          </div>
        </header>
        <div class="lineup-frame">
          <ul id="participantList" class="lineup-table"></ul>
        </div>
        <p id="modalCount" class="lineup-count"></p>
        <p id="modalFormMessage" class="lineup-form-message"></p>
      </div>
    </div>
  </div>

  <script src="js/calendar.js"></script>
</body>
</html>
