<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NORTH PINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>NORTH PINE 参加者リスト</h1>
        <p>開いたときは今後の予定のみ表示されます。過去の月はプルダウンから選んでください。</p>
      </div>
      <div class="controls controls-row">
        <div class="controls__group">
          <label for="schedule-select">日程</label>
          <select id="schedule-select" aria-label="今後の予定または過去の月を選択"></select>
        </div>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div class="sessions-scroll">
      <div id="sessions" class="sessions"></div>
    </div>

    <footer>データは Google スプレッドシートの公開 CSV、または GAS ウェブアプリ経由で取得しています。</footer>
  </div>

  <script>
    /** スプレッドシート ID（月シートは YYYYMM 名で存在するものだけプルダウンに出る） */
    const SPREADSHEET_ID = "1-07mnQUToyJjD2pNau99a0dCLmg_0chswzvv3eW4t30";

    /**
     * GAS ウェブアプリの URL（末尾の /exec まで）。
     * gas/Code.gs をデプロイしたあとに貼る。空のままなら従来どおり CSV のみ（背景色は使わない）。
     */
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxbgdkzodm824U8bppBN4o-Ib5EcyTEOfye41vb_6ev3h-pFlvjCyJvcR-JhOZosiqz/exec";

    /**
     * 月次シートのほかに参照するシート名（過去回の名前など）。
     * 存在しない場合は無視されます。
     */
    const LOOKUP_SHEET_NAME = "参加者";

    /** シート存在確認の候補の開始年月（この月以降だけ試す） */
    const SHEET_PROBE_FROM_YEAR = 2025;
    const SHEET_PROBE_FROM_MONTH = 1;

    /**
     * 今日の月より後の YYYYMM シートを、最大何ヶ月先まで試すか。
     * 例: 202605 を追加する場合など、未来の月シートをプルダウンに出すために使う。
     */
    const SHEET_PROBE_FUTURE_MONTHS = 24;

    /** 日程プラン構築時に同時取得する月シート数（多すぎると GAS に負荷） */
    const SHEET_FETCH_CONCURRENCY = 5;

    /** シート一覧のキャッシュ（ミリ秒） */
    const SHEET_LIST_CACHE_MS = 60 * 60 * 1000;

    function sheetNamesRange(fromYear, fromMonth, toYear, toMonth) {
      const out = [];
      let y = fromYear;
      let m = fromMonth;
      while (y < toYear || (y === toYear && m <= toMonth)) {
        out.push(`${y}${String(m).padStart(2, "0")}`);
        m += 1;
        if (m > 12) {
          m = 1;
          y += 1;
        }
      }
      return out;
    }

    /** プローブ開始月から「今月＋未来 N ヶ月」までの YYYYMM 候補（202605 なども含む） */
    /** ローカル日付の「今月」を YYYYMM（シート名と比較用） */
    function currentYmSix() {
      const n = new Date();
      return `${n.getFullYear()}${String(n.getMonth() + 1).padStart(2, "0")}`;
    }

    function sheetCandidatesForDiscovery() {
      const now = new Date();
      const ty = now.getFullYear();
      const tm = now.getMonth() + 1;
      let endY = ty;
      let endM = tm + SHEET_PROBE_FUTURE_MONTHS;
      while (endM > 12) {
        endM -= 12;
        endY += 1;
      }
      return sheetNamesRange(
        SHEET_PROBE_FROM_YEAR,
        SHEET_PROBE_FROM_MONTH,
        endY,
        endM,
      );
    }

    function csvLooksValid(text) {
      const t = String(text || "")
        .replace(/^\uFEFF/, "")
        .trimStart();
      if (!t || t.startsWith("<") || t.startsWith("<!")) return false;
      if (t.length < 2) return false;
      /* 1行だけの CSV や改行コード差でも弾かない */
      return t.includes(",") || t.includes("\t");
    }

    async function fetchSheetText(sheetName) {
      const res = await fetch(csvUrl(sheetName));
      if (!res.ok) return null;
      const text = await res.text();
      if (!csvLooksValid(text)) return null;
      return text;
    }

    async function sheetExists(sheetName) {
      const text = await fetchSheetText(sheetName);
      return text !== null;
    }

    async function discoverMonthSheets() {
      const cacheKey = `monthSheets_${SPREADSHEET_ID}_v6`;
      try {
        const raw = sessionStorage.getItem(cacheKey);
        if (raw) {
          const { list, ts } = JSON.parse(raw);
          if (
            Array.isArray(list) &&
            Date.now() - (ts || 0) < SHEET_LIST_CACHE_MS
          ) {
            return list;
          }
        }
      } catch (_) {
        /* ignore */
      }

      const candidates = sheetCandidatesForDiscovery();
      const batchSize = 6;
      const found = [];
      for (let i = 0; i < candidates.length; i += batchSize) {
        const chunk = candidates.slice(i, i + batchSize);
        const flags = await Promise.all(
          chunk.map((ym) => sheetExists(ym).then((ok) => (ok ? ym : null))),
        );
        for (const ym of flags) {
          if (ym) found.push(ym);
        }
      }
      const list = found.sort((a, b) => b.localeCompare(a));
      try {
        sessionStorage.setItem(
          cacheKey,
          JSON.stringify({ list, ts: Date.now() }),
        );
      } catch (_) {
        /* ignore */
      }
      return list;
    }

    /** 参加者は最大この人数ぶんの行を表示（空枠で埋める） */
    const MAX_PARTICIPANTS = 15;

    /**
     * シート上の行番号（1始まり）。
     * 1行目にタイトルがあり「2行目＝日付・3行目＝場所・4〜18行目＝名前」の場合は
     * dateRow:2, placeRow:3, nameStartRow:4 に変更してください。
     */
    const LAYOUT = {
      dateRow: 1,
      placeRow: 2,
      nameStartRow: 3,
      nameEndRow: 18,
    };

    function csvUrl(sheetName) {
      const q = new URLSearchParams({
        tqx: "out:csv",
        sheet: sheetName,
      });
      return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${q}`;
    }

    function gasWebAppBase() {
      const u = String(GAS_WEB_APP_URL || "").trim();
      if (!u) return "";
      return u.replace(/\/$/, "");
    }

    /**
     * GAS から { sessions } を取得（セル背景で初参加フラグ付き）。
     * URL 未設定・失敗時は null。
     */
    async function fetchSessionsViaGas(sheetName) {
      const base = gasWebAppBase();
      if (!base) return null;
      const url = `${base}?sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const j = await res.json();
        if (!j || j.ok !== true || !Array.isArray(j.sessions)) return null;
        return normalizeGasSessions(j.sessions);
      } catch (err) {
        console.warn("GAS fetch failed", err);
        return null;
      }
    }

    /** POST でも同じ API を叩ける（CORS で失敗する環境向けに GET を優先） */
    async function fetchSessionsViaGasPost(sheetName) {
      const base = gasWebAppBase();
      if (!base) return null;
      try {
        const res = await fetch(base, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sheet: sheetName }),
        });
        if (!res.ok) return null;
        const j = await res.json();
        if (!j || j.ok !== true || !Array.isArray(j.sessions)) return null;
        return normalizeGasSessions(j.sessions);
      } catch (err) {
        console.warn("GAS POST failed", err);
        return null;
      }
    }

    function normalizeGasSessions(raw) {
      return raw.map((s) => ({
        col: typeof s.col === "number" ? s.col : 0,
        date: String(s.date || "").trim(),
        place: s.place != null && String(s.place).trim() ? String(s.place).trim() : "—",
        slots: normalizeGasSlots(s.slots),
      }));
    }

    function normalizeGasSlots(slots) {
      const out = [];
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const sl = slots && slots[i] ? slots[i] : {};
        out.push({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: Boolean(sl.isFirst),
          isFemale: Boolean(sl.isFemale),
        });
      }
      return out;
    }

    function startOfLocalDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function sameLocalCalendarDay(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    /**
     * 日付セル（例: 4/15(水)、3月30日、2026/4/25）を Date にする。年は月シート名 YYYYMM を補完。
     */
    function parseSessionDateFromCell(dateStr, ymSix) {
      const raw = String(dateStr || "")
        .normalize("NFKC")
        .trim();
      if (!raw) return null;
      const ymd = raw.match(
        /(\d{4})[\/\.\-年](\d{1,2})[\/\.\-月](\d{1,2})/,
      );
      if (ymd) {
        const dt = new Date(+ymd[1], +ymd[2] - 1, +ymd[3]);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const t = raw
        .replace(/\([^)]*\)/g, "")
        .replace(/（[^）]*）/g, "")
        .replace(/\s+/g, " ")
        .trim();
      const jp = t.match(/(\d{1,2})月(\d{1,2})日/);
      if (jp && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +jp[1] - 1;
        const da = +jp[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const md = t.match(/(\d{1,2})[\/．\.](\d{1,2})/);
      if (md && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +md[1] - 1;
        const da = +md[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      return null;
    }

    /**
     * 日付文字列が refDay の暦日と一致するか（パース失敗時のフォールバック）。
     */
    function dateCellLooksLikeCalendarDay(dateStr, refDay) {
      const t = String(dateStr || "").normalize("NFKC");
      if (!t || !refDay) return false;
      const y = refDay.getFullYear();
      const m = refDay.getMonth() + 1;
      const d = refDay.getDate();
      if (
        t.includes(`${y}年${m}月${d}日`) ||
        t.includes(`${y}/${m}/${d}`) ||
        t.includes(`${y}-${m}-${d}`)
      ) {
        return true;
      }
      const re = new RegExp(
        `(^|[^0-9])0*${m}[/.．月]0*${d}(?:日|[(（]|[^0-9]|$)`,
      );
      return re.test(t);
    }

    function sessionHitsTargetDay(s, targetDay, ymSix) {
      const dt = parseSessionDateFromCell(s.date, ymSix);
      if (dt && sameLocalCalendarDay(startOfLocalDay(dt), targetDay)) {
        return true;
      }
      return dateCellLooksLikeCalendarDay(s.date, targetDay);
    }

    /**
     * 本日の列、なければ「本日以降で最も近い日」の列だけ黄色強調。
     * 過去日のみのシートでは強調しない。
     */
    function annotateNearestSessions(sessions, ymSix) {
      if (!sessions || !sessions.length) return sessions;
      if (!ymSix || !/^\d{6}$/.test(ymSix)) return sessions;

      const today = startOfLocalDay(new Date());
      const rows = sessions.map((s) => ({
        s,
        dt: parseSessionDateFromCell(s.date, ymSix),
      }));

      const withDt = rows.filter((x) => x.dt);
      let targetDay = null;

      const onCalendarToday = rows.filter((x) =>
        sessionHitsTargetDay(x.s, today, ymSix),
      );
      if (onCalendarToday.length) {
        targetDay = today;
      } else if (withDt.length) {
        const futureOrToday = withDt
          .filter((x) => startOfLocalDay(x.dt) >= today)
          .sort((a, b) => a.dt - b.dt);
        if (futureOrToday.length) {
          targetDay = startOfLocalDay(futureOrToday[0].dt);
        }
      }

      if (!targetDay) {
        return sessions.map((s) => ({ ...s, highlightNext: false }));
      }

      return sessions.map((s) => ({
        ...s,
        highlightNext: sessionHitsTargetDay(s, targetDay, ymSix),
      }));
    }

    /**
     * 複数月シートにまたがる「今後の予定」一覧用。
     * 本日を含む列、なければ全体で最も近い未来日の列を強調する。
     */
    function annotateNearestAcrossMany(entries) {
      if (!entries || !entries.length) return [];
      const today = startOfLocalDay(new Date());
      let targetDay = null;
      const onToday = entries.filter((e) =>
        sessionHitsTargetDay(e.session, today, e.sheetName),
      );
      if (onToday.length) {
        targetDay = today;
      } else {
        const fut = entries
          .filter((e) => e.dt && startOfLocalDay(e.dt) >= today)
          .sort((a, b) => a.dt - b.dt);
        if (fut.length) targetDay = startOfLocalDay(fut[0].dt);
      }
      return entries.map((e) => ({
        ...e.session,
        highlightNext: targetDay
          ? sessionHitsTargetDay(e.session, targetDay, e.sheetName)
          : false,
      }));
    }

    /** 簡易 CSV パーサ（ダブルクォート・エスケープ対応） */
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let i = 0;
      let inQuotes = false;

      while (i < text.length) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') {
              cell += '"';
              i += 2;
              continue;
            }
            inQuotes = false;
            i++;
            continue;
          }
          cell += c;
          i++;
          continue;
        }
        if (c === '"') {
          inQuotes = true;
          i++;
          continue;
        }
        if (c === ",") {
          row.push(cell);
          cell = "";
          i++;
          continue;
        }
        if (c === "\r") {
          i++;
          continue;
        }
        if (c === "\n") {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          i++;
          continue;
        }
        cell += c;
        i++;
      }
      row.push(cell);
      if (row.length > 1 || row[0] !== "") {
        rows.push(row);
      }
      return rows;
    }

    function formatSheetLabel(name) {
      const m = /^(\d{4})(\d{2})$/.exec(name.trim());
      if (!m) return name;
      const y = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10);
      return `${y}年${mo}月（${name}）`;
    }

    function idx1(n) {
      return n - 1;
    }

    function cell(rows, r, c) {
      if (!rows[r] || rows[r][c] === undefined) return "";
      const v = rows[r][c];
      return String(v).trim();
    }

    /** 表示用: 見えない文字・全角スペースだけのセルは空とみなす */
    function normalizeParticipantDisplay(s) {
      let t = String(s ?? "");
      t = t.normalize("NFKC");
      t = t.replace(/\u200b|\u200c|\u200d|\ufeff/g, "");
      t = t.replace(/\u00a0|\u3000/g, " ");
      t = t.replace(/\s+/g, " ").trim();
      return t;
    }

    function slotHasName(slot) {
      return Boolean(normalizeParticipantDisplay(slot.display));
    }

    function isSessionCountLabel(s) {
      return s === "開催回数" || s.startsWith("開催回数");
    }

    /**
     * シート上のメモ用表記を検出し、初参加なら強調用フラグを付ける。
     * 表示からは（初）などの装飾だけ除き、名前本体は残す。
     */
    function parseParticipantCell(raw) {
      const rawStr = normalizeParticipantDisplay(raw);
      if (!rawStr) {
        return { display: "", isFirst: false, isFemale: false };
      }
      let t = rawStr;
      let isFirst = false;
      const markers = [
        "【初参加】",
        "（初）",
        "(初)",
        "【初】",
        "初参加",
        "［初］",
        "[初]",
      ];
      for (const m of markers) {
        if (t.includes(m)) {
          isFirst = true;
          t = t.split(m).join("");
        }
      }
      if (/\bNEW\b/i.test(t)) {
        isFirst = true;
        t = t.replace(/\bNEW\b/gi, "");
      }
      t = t.replace(/\s{2,}/g, " ").trim();
      const display = normalizeParticipantDisplay(t) || rawStr;
      return { display, isFirst, isFemale: false };
    }

    /**
     * 参加者欄: nameStart から連続して MAX_PARTICIPANTS 行。
     * 「開催回数」以降は空枠。開催回数の文字自体は表示しない。
     */
    function collectNameSlots(rows, c, ns, ne) {
      const slots = [];
      let footer = false;
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const r = ns + i;
        if (footer || r > ne) {
          slots.push({ raw: "" });
          continue;
        }
        const raw = cell(rows, r, c);
        if (isSessionCountLabel(raw)) {
          footer = true;
          slots.push({ raw: "" });
          continue;
        }
        slots.push({ raw });
      }
      return slots.map(({ raw }) => parseParticipantCell(raw));
    }

    function normalizeKeyPart(s) {
      return String(s || "")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .trim();
    }

    function cloneSession(s) {
      return {
        col: s.col,
        date: s.date,
        place: s.place,
        slots: s.slots.map((sl) => ({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: sl.isFirst,
          isFemale: Boolean(sl.isFemale),
        })),
      };
    }

    /**
     * 「参加者」シートから名前を補完する。
     * 日付だけの一致は年をまたぐと誤爆するため、列まるごと置換は「日付＋場所」が一致するときのみ。
     * 日付のみ一致のときは、空のマスだけ埋める（既に名前があるセルは上書きしない）。
     */
    function mergeSessionsFromLookup(mainSessions, lookupSessions) {
      if (!lookupSessions || !lookupSessions.length) return mainSessions;

      const byDatePlace = new Map();
      const byDate = new Map();
      for (const s of lookupSessions) {
        const dk = normalizeKeyPart(s.date);
        const pk = normalizeKeyPart(s.place);
        if (dk && pk && pk !== "—") {
          byDatePlace.set(`${dk}\t${pk}`, s);
        }
        if (!dk) continue;
        if (!byDate.has(dk)) {
          byDate.set(dk, cloneSession(s));
          continue;
        }
        const prev = byDate.get(dk);
        const mergedLu = {
          ...prev,
          place: prev.place && prev.place !== "—" ? prev.place : s.place,
          slots: prev.slots.map((pa, i) => {
            const pb = s.slots[i];
            if (pa && slotHasName(pa)) {
              return {
                display: normalizeParticipantDisplay(pa.display),
                isFirst: Boolean(pa.isFirst),
                isFemale: Boolean(pa.isFemale),
              };
            }
            if (pb && slotHasName(pb)) {
              return {
                display: normalizeParticipantDisplay(pb.display),
                isFirst: Boolean(pb.isFirst),
                isFemale: Boolean(pb.isFemale),
              };
            }
            return { display: "", isFirst: false, isFemale: false };
          }),
        };
        byDate.set(dk, mergedLu);
      }

      function findStrict(date, place) {
        const dk = normalizeKeyPart(date);
        const pk = normalizeKeyPart(place);
        if (!dk || !pk || pk === "—") return null;
        return byDatePlace.get(`${dk}\t${pk}`) || null;
      }

      function findLooseByDate(date) {
        const dk = normalizeKeyPart(date);
        return dk ? byDate.get(dk) || null : null;
      }

      const out = mainSessions.map((s) => {
        const merged = cloneSession(s);
        const strict = findStrict(s.date, s.place);
        const loose = strict ? null : findLooseByDate(s.date);
        const luStrict = strict;
        const luLoose = loose;

        const mainEmpty = !merged.slots.some((x) => slotHasName(x));

        if (mainEmpty && luStrict) {
          merged.slots = luStrict.slots.map((sl) => ({
            display: normalizeParticipantDisplay(sl.display),
            isFirst: sl.isFirst,
            isFemale: Boolean(sl.isFemale),
          }));
          return merged;
        }

        const luForSlots = luStrict || luLoose;
        if (!luForSlots) return merged;

        merged.slots = merged.slots.map((slot, i) => {
          if (slotHasName(slot)) return slot;
          const f = luForSlots.slots[i];
          if (f && slotHasName(f)) {
            return {
              display: normalizeParticipantDisplay(f.display),
              isFirst: f.isFirst,
              isFemale: Boolean(f.isFemale),
            };
          }
          return slot;
        });
        return merged;
      });

      return out;
    }

    /**
     * 列ごとに { date, place, slots } を組み立てる。
     * 日付セルが空の列は含めない。
     */
    function buildSessions(rows) {
      const dr = idx1(LAYOUT.dateRow);
      const pr = idx1(LAYOUT.placeRow);
      const ns = idx1(LAYOUT.nameStartRow);
      const ne = idx1(LAYOUT.nameEndRow);

      const maxCol = Math.max(
        ...rows.map((r) => r.length),
        0,
      );

      const sessions = [];
      for (let c = 0; c < maxCol; c++) {
        const date = cell(rows, dr, c);
        if (!date) continue;

        const place = cell(rows, pr, c);
        const slots = collectNameSlots(rows, c, ns, ne);
        sessions.push({
          col: c,
          date,
          place: place || "—",
          slots,
        });
      }
      return sessions;
    }

    const statusEl = document.getElementById("status");
    const sessionsEl = document.getElementById("sessions");
    const sessionsScrollEl = document.querySelector(".sessions-scroll");
    const scheduleSelectEl = document.getElementById("schedule-select");

    /** 全月シート読み込み後の { sheetName, session, dt } プラン */
    let sessionPlan = null;

    function setStatus(kind, message) {
      statusEl.className = "status is-visible";
      statusEl.textContent = message;
      statusEl.classList.toggle("status--loading", kind === "loading");
      statusEl.classList.toggle("status--error", kind === "error");
      if (kind === "hidden") {
        statusEl.classList.remove("is-visible");
      }
    }

    function renderSessions(sessions, emptyHint) {
      sessionsEl.innerHTML = "";
      if (!sessions.length) {
        const p = document.createElement("p");
        p.className = "empty-sheet";
        p.textContent =
          emptyHint ||
          "日付の入っている列がありません。LAYOUT の行番号をスプレッドシートに合わせて調整してください。";
        sessionsEl.appendChild(p);
        return;
      }

      for (const s of sessions) {
        const card = document.createElement("article");
        card.className = "session";
        if (s.highlightNext) {
          card.classList.add("session--highlight-nearest");
        }

        const head = document.createElement("div");
        head.className = "session__head";

        const h2 = document.createElement("h2");
        h2.className = "session__date";
        h2.textContent = s.date;
        head.appendChild(h2);

        card.appendChild(head);

        const place = document.createElement("div");
        place.className = "session__place";
        place.innerHTML =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
        const placeText = document.createElement("span");
        placeText.textContent = s.place;
        place.appendChild(placeText);
        card.appendChild(place);

        const ul = document.createElement("ul");
        ul.className = "session__names";
        const hasAnyone = s.slots.some((x) => slotHasName(x));
        if (!hasAnyone) {
          const li = document.createElement("li");
          li.className = "session__row session__row--empty-row";
            li.innerHTML =
            '<span class="session__num" aria-hidden="true">—</span><span class="session__name">参加者なし</span>';
          ul.appendChild(li);
        } else {
          s.slots.forEach((slot, index) => {
            const li = document.createElement("li");
            const num = index + 1;
            const display = normalizeParticipantDisplay(slot.display);
            const empty = !display;
            li.className = "session__row";
            if (empty) li.classList.add("session__row--slot-empty");
            if (slot.isFirst && !empty) li.classList.add("session__row--first");
            if (slot.isFemale && !empty) li.classList.add("session__row--female");

            const numEl = document.createElement("span");
            numEl.className = "session__num";
            numEl.setAttribute("aria-hidden", "true");
            numEl.textContent = String(num);

            const nameEl = document.createElement("span");
            nameEl.className = "session__name";
            nameEl.textContent = display;

            li.appendChild(numEl);
            li.appendChild(nameEl);

            if (slot.isFirst && !empty) {
              const badge = document.createElement("span");
              badge.className = "session__badge";
              badge.textContent = "初";
              badge.title = "初参加";
              li.appendChild(badge);
            }

            if (slot.isFemale && !empty) {
              const fb = document.createElement("span");
              fb.className = "session__badge-female";
              fb.textContent = "女";
              fb.title = "女性";
              li.appendChild(fb);
            }

            ul.appendChild(li);
          });
        }
        card.appendChild(ul);
        sessionsEl.appendChild(card);
      }
    }

    async function fetchLookupSessionsOnce() {
      const useGas = Boolean(gasWebAppBase());
      let lookupSessions = null;
      if (useGas) {
        lookupSessions = await fetchSessionsViaGas(LOOKUP_SHEET_NAME);
        if (!lookupSessions) {
          lookupSessions = await fetchSessionsViaGasPost(LOOKUP_SHEET_NAME);
        }
      }
      if (!lookupSessions) {
        const lookupText = await fetchSheetText(LOOKUP_SHEET_NAME);
        if (lookupText && csvLooksValid(lookupText)) {
          lookupSessions = buildSessions(parseCSV(lookupText));
        }
      }
      return lookupSessions && lookupSessions.length ? lookupSessions : null;
    }

    /** 1 枚の月シートのセッション（参加者シートとマージ済み・シート内の強調付き） */
    async function fetchMergedSessionsForSheet(sheetName, lookupSessions) {
      const useGas = Boolean(gasWebAppBase());
      let sessions = null;
      if (useGas) {
        sessions = await fetchSessionsViaGas(sheetName);
        if (!sessions) sessions = await fetchSessionsViaGasPost(sheetName);
      }
      if (!sessions) {
        const mainText = await fetchSheetText(sheetName);
        if (!mainText || !csvLooksValid(mainText)) return [];
        sessions = buildSessions(parseCSV(mainText));
      }
      if (lookupSessions && lookupSessions.length) {
        sessions = mergeSessionsFromLookup(sessions, lookupSessions);
      }
      return annotateNearestSessions(sessions, sheetName);
    }

    function scrollSessionsToStart() {
      if (sessionsScrollEl) sessionsScrollEl.scrollLeft = 0;
    }

    /** 同一暦日の重複排除用キー（ローカル日） */
    function calendarDayKeyFromDate(dt) {
      const x = startOfLocalDay(dt);
      return `${x.getFullYear()}-${x.getMonth()}-${x.getDate()}`;
    }

    /**
     * 各月シートの列を走査し、本日以降だけを集める。
     * 日付順に並べ、同一暦日は 1 列だけ残す。
     */
    function collectFutureEntriesFromSheets(plan) {
      if (!plan?.sessionsBySheet?.size) return [];
      const today = startOfLocalDay(new Date());
      const sheetOrder = [...plan.sessionsBySheet.keys()].sort((a, b) =>
        a.localeCompare(b),
      );
      const rows = [];
      for (const sheetName of sheetOrder) {
        const sessions = plan.sessionsBySheet.get(sheetName);
        for (const s of sessions) {
          const dt = parseSessionDateFromCell(s.date, sheetName);
          if (!dt) continue;
          if (startOfLocalDay(dt) < today) continue;
          rows.push({ sheetName, session: s, dt });
        }
      }
      rows.sort((a, b) => {
        const ta = startOfLocalDay(a.dt).getTime();
        const tb = startOfLocalDay(b.dt).getTime();
        if (ta !== tb) return ta - tb;
        if (a.session.col !== b.session.col) return a.session.col - b.session.col;
        return a.sheetName.localeCompare(b.sheetName);
      });
      const seenDay = new Set();
      const out = [];
      for (const e of rows) {
        const dk = calendarDayKeyFromDate(e.dt);
        if (seenDay.has(dk)) continue;
        seenDay.add(dk);
        out.push(e);
      }
      out.sort((a, b) => {
        const ta = startOfLocalDay(a.dt).getTime();
        const tb = startOfLocalDay(b.dt).getTime();
        if (ta !== tb) return ta - tb;
        return a.session.col - b.session.col;
      });
      return out;
    }

    /** 過去の月を選んだときの option value 接頭辞 */
    const PAST_MONTH_PREFIX = "pastMonth:";

    /**
     * gviz の誤シート返却などで、日付列の暦月がシート名 YYYYMM と著しくずれているときは除外する。
     * パースできた列の過半数がシートの年月と一致するときだけ採用。
     */
    function sessionsPlausibleForSheet(sessions, ymSix) {
      if (!sessions || !sessions.length) return false;
      if (!/^\d{6}$/.test(ymSix)) return false;
      const sy = +ymSix.slice(0, 4);
      const sm = +ymSix.slice(4, 6);
      let parsed = 0;
      let match = 0;
      for (const s of sessions) {
        const dt = parseSessionDateFromCell(s.date, ymSix);
        if (!dt) continue;
        parsed++;
        if (dt.getFullYear() === sy && dt.getMonth() + 1 === sm) match++;
      }
      if (parsed === 0) return false;
      return match * 2 >= parsed;
    }

    /**
     * 指定した YYYYMM シートだけ取得（初回は今月以降のみ＝高速化）。
     * sessionsBySheet … 妥当性チェック済みの月シートごとの全列
     */
    async function buildSessionPlan(sheetIds) {
      const lookupSessions = await fetchLookupSessionsOnce();
      const allEntries = [];
      const sessionsBySheet = new Map();

      for (let i = 0; i < sheetIds.length; i += SHEET_FETCH_CONCURRENCY) {
        const chunk = sheetIds.slice(i, i + SHEET_FETCH_CONCURRENCY);
        const parts = await Promise.all(
          chunk.map((sheetName) =>
            fetchMergedSessionsForSheet(sheetName, lookupSessions).then(
              (sessions) => ({ sheetName, sessions }),
            ),
          ),
        );
        for (const { sheetName, sessions } of parts) {
          const list = [...(sessions || [])].sort((a, b) => a.col - b.col);
          if (!sessionsPlausibleForSheet(list, sheetName)) continue;
          sessionsBySheet.set(sheetName, list);
          const seenColInSheet = new Set();
          for (const s of list) {
            const dt = parseSessionDateFromCell(s.date, sheetName);
            if (!dt) continue;
            const colKey = `${sheetName}:${s.col}`;
            if (seenColInSheet.has(colKey)) continue;
            seenColInSheet.add(colKey);
            allEntries.push({ sheetName, session: s, dt });
          }
        }
      }

      return {
        lookupSessions,
        allEntries,
        sessionsBySheet,
      };
    }

    /** 過去月シートをまだ読んでいなければ取得して sessionsBySheet に載せる */
    async function ensurePastSheetLoaded(sheetName) {
      if (!sessionPlan?.sessionsBySheet) return false;
      if (sessionPlan.sessionsBySheet.has(sheetName)) return true;
      setStatus("loading", "読み込み中…");
      try {
        const list = await fetchMergedSessionsForSheet(
          sheetName,
          sessionPlan.lookupSessions,
        );
        const sorted = [...(list || [])].sort((a, b) => a.col - b.col);
        if (!sessionsPlausibleForSheet(sorted, sheetName)) {
          setStatus("hidden", "");
          return false;
        }
        sessionPlan.sessionsBySheet.set(sheetName, sorted);
        const seenCol = new Set();
        for (const s of sorted) {
          const dt = parseSessionDateFromCell(s.date, sheetName);
          if (!dt) continue;
          const ck = `${sheetName}:${s.col}`;
          if (seenCol.has(ck)) continue;
          seenCol.add(ck);
          sessionPlan.allEntries.push({ sheetName, session: s, dt });
        }
        setStatus("hidden", "");
        return true;
      } catch (_) {
        setStatus("hidden", "");
        return false;
      }
    }

    function rebuildScheduleSelect(plan) {
      scheduleSelectEl.innerHTML = "";

      const ogUp = document.createElement("optgroup");
      ogUp.label = "今後の予定";

      const futureRows = collectFutureEntriesFromSheets(plan);
      if (!futureRows.length) {
        const o = document.createElement("option");
        o.value = "";
        o.textContent = "（今後の予定なし）";
        o.disabled = true;
        ogUp.appendChild(o);
      } else {
        const allOpt = document.createElement("option");
        allOpt.value = "__ALL__";
        allOpt.textContent = "今後の予定（全表示）";
        ogUp.appendChild(allOpt);
      }
      scheduleSelectEl.appendChild(ogUp);

      const ogPast = document.createElement("optgroup");
      ogPast.label = "過去の日程";

      const pastIds = Array.isArray(plan.pastSheetIds)
        ? plan.pastSheetIds
        : [];
      if (!pastIds.length) {
        const o = document.createElement("option");
        o.value = "";
        o.textContent = "（過去の日程なし）";
        o.disabled = true;
        ogPast.appendChild(o);
      } else {
        for (const sh of pastIds) {
          const opt = document.createElement("option");
          opt.value = `${PAST_MONTH_PREFIX}${sh}`;
          opt.textContent = formatSheetLabel(sh);
          ogPast.appendChild(opt);
        }
      }
      scheduleSelectEl.appendChild(ogPast);

      scheduleSelectEl.disabled =
        !collectFutureEntriesFromSheets(plan).length &&
        !(Array.isArray(plan.pastSheetIds) && plan.pastSheetIds.length);
    }

    function renderUpcomingAll() {
      if (!sessionPlan) {
        renderSessions([], "読み込み中のデータがありません。");
        return;
      }
      const entries = collectFutureEntriesFromSheets(sessionPlan);
      if (!entries.length) {
        renderSessions(
          [],
          "今後の予定がありません。過去の月はプルダウンの「過去の日程」から選べます。",
        );
        return;
      }
      renderSessions(annotateNearestAcrossMany(entries));
      scrollSessionsToStart();
    }

    /** 過去: その月シートのうち「今日より前」の列だけを列順で表示 */
    async function renderPastMonthSheet(sheetName) {
      if (!sessionPlan || !sessionPlan.sessionsBySheet) return;
      const loaded = await ensurePastSheetLoaded(sheetName);
      if (!loaded) {
        renderSessions(
          [],
          "この月のデータを取得できませんでした。",
        );
        scrollSessionsToStart();
        return;
      }
      const sessions = sessionPlan.sessionsBySheet.get(sheetName);
      if (!sessions || !sessions.length) return;
      const today = startOfLocalDay(new Date());
      const pastOnly = sessions.filter((s) => {
        const dt = parseSessionDateFromCell(s.date, sheetName);
        if (!dt) return false;
        return startOfLocalDay(dt) < today;
      });
      if (!pastOnly.length) {
        renderSessions(
          [],
          "この月に表示できる過去の日程がありません。",
        );
        scrollSessionsToStart();
        return;
      }
      renderSessions(annotateNearestSessions(pastOnly, sheetName));
      scrollSessionsToStart();
    }

    let scheduleSelectWired = false;

    function wireScheduleSelectOnce() {
      if (scheduleSelectWired) return;
      scheduleSelectWired = true;

      scheduleSelectEl.addEventListener("change", async () => {
        const v = scheduleSelectEl.value;
        if (!v || v === "") {
          if (
            sessionPlan &&
            collectFutureEntriesFromSheets(sessionPlan).length
          ) {
            scheduleSelectEl.value = "__ALL__";
            renderUpcomingAll();
          } else {
            renderSessions(
              [],
              "今後の予定がありません。過去の月はプルダウンの「過去の日程」から選べます。",
            );
          }
          return;
        }
        if (v === "__ALL__") {
          renderUpcomingAll();
          return;
        }
        if (v.startsWith(PAST_MONTH_PREFIX)) {
          await renderPastMonthSheet(v.slice(PAST_MONTH_PREFIX.length));
          return;
        }
      });
    }

    async function bootstrap() {
      setStatus("loading", "スプレッドシート上のシートを確認中…");
      try {
        const list = await discoverMonthSheets();
        if (!list.length) {
          setStatus(
            "error",
            "表示できる月シート（YYYYMM）がありません。共有設定とシート名を確認してください。",
          );
          return;
        }
        const cur = currentYmSix();
        let toFetch = list
          .filter((ym) => /^\d{6}$/.test(ym) && ym >= cur)
          .sort((a, b) => a.localeCompare(b));
        if (!toFetch.length) {
          toFetch = [...list].sort((a, b) => a.localeCompare(b));
        }
        const pastSheetIds = list
          .filter((ym) => /^\d{6}$/.test(ym) && ym < cur)
          .sort((a, b) => b.localeCompare(a));

        setStatus("loading", "今月以降のシートを読み込み中…");
        sessionPlan = await buildSessionPlan(toFetch);
        sessionPlan.pastSheetIds = pastSheetIds;

        if (
          !sessionPlan.sessionsBySheet.size &&
          !sessionPlan.allEntries.length
        ) {
          setStatus(
            "error",
            "日付として解釈できる列がありません。日付セルの形式を確認してください。",
          );
          return;
        }
        rebuildScheduleSelect(sessionPlan);
        wireScheduleSelectOnce();
        if (collectFutureEntriesFromSheets(sessionPlan).length) {
          scheduleSelectEl.value = "__ALL__";
          renderUpcomingAll();
        } else if (pastSheetIds.length) {
          const sh = pastSheetIds[0];
          scheduleSelectEl.value = `${PAST_MONTH_PREFIX}${sh}`;
          await renderPastMonthSheet(sh);
        } else {
          scheduleSelectEl.value = "";
          renderSessions(
            [],
            "表示できる日程がありません。",
          );
        }
        setStatus("hidden", "");
      } catch (e) {
        setStatus("error", "初期化に失敗しました。ネットワークを確認してください。");
        console.error(e);
      }
    }

    bootstrap();
  </script>
</body>
