<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NORTH PINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>NORTH PINE 参加者リスト</h1>
        <p>シートを切り替えて各回の日程・場所・参加者を表示します。</p>
      </div>
      <div class="controls controls-row">
        <div class="controls__group">
          <label for="sheet-select-upcoming">今後の予定</label>
          <select id="sheet-select-upcoming" aria-label="今後の予定の月シートを選択"></select>
        </div>
        <div class="controls__group">
          <label for="sheet-select-past">過去の月</label>
          <select id="sheet-select-past" aria-label="過去の月シートを選択"></select>
        </div>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div class="sessions-scroll">
      <div id="sessions" class="sessions"></div>
    </div>

    <footer>データは Google スプレッドシートの公開 CSV、または GAS ウェブアプリ経由で取得しています。</footer>
  </div>

  <script>
    /** スプレッドシート ID（月シートは YYYYMM 名で存在するものだけプルダウンに出る） */
    const SPREADSHEET_ID = "1-07mnQUToyJjD2pNau99a0dCLmg_0chswzvv3eW4t30";

    /**
     * GAS ウェブアプリの URL（末尾の /exec まで）。
     * gas/Code.gs をデプロイしたあとに貼る。空のままなら従来どおり CSV のみ（背景色は使わない）。
     */
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxbgdkzodm824U8bppBN4o-Ib5EcyTEOfye41vb_6ev3h-pFlvjCyJvcR-JhOZosiqz/exec";

    /**
     * 月次シートのほかに参照するシート名（過去回の名前など）。
     * 存在しない場合は無視されます。
     */
    const LOOKUP_SHEET_NAME = "参加者";

    /** シート存在確認の候補の開始年月（この月以降だけ試す） */
    const SHEET_PROBE_FROM_YEAR = 2025;
    const SHEET_PROBE_FROM_MONTH = 1;

    /**
     * 今日の月より後の YYYYMM シートを、最大何ヶ月先まで試すか。
     * 例: 202605 を追加する場合など、未来の月シートをプルダウンに出すために使う。
     */
    const SHEET_PROBE_FUTURE_MONTHS = 24;

    /** シート一覧のキャッシュ（ミリ秒） */
    const SHEET_LIST_CACHE_MS = 60 * 60 * 1000;

    function sheetNamesRange(fromYear, fromMonth, toYear, toMonth) {
      const out = [];
      let y = fromYear;
      let m = fromMonth;
      while (y < toYear || (y === toYear && m <= toMonth)) {
        out.push(`${y}${String(m).padStart(2, "0")}`);
        m += 1;
        if (m > 12) {
          m = 1;
          y += 1;
        }
      }
      return out;
    }

    /** ローカル日付の「今月」を YYYYMM 6 桁で返す */
    function currentYmSix() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      return `${y}${String(m).padStart(2, "0")}`;
    }

    /** プローブ開始月から「今月＋未来 N ヶ月」までの YYYYMM 候補（202605 なども含む） */
    function sheetCandidatesForDiscovery() {
      const now = new Date();
      const ty = now.getFullYear();
      const tm = now.getMonth() + 1;
      let endY = ty;
      let endM = tm + SHEET_PROBE_FUTURE_MONTHS;
      while (endM > 12) {
        endM -= 12;
        endY += 1;
      }
      return sheetNamesRange(
        SHEET_PROBE_FROM_YEAR,
        SHEET_PROBE_FROM_MONTH,
        endY,
        endM,
      );
    }

    /**
     * 発見した月シート一覧を、「今月」基準で分割する。
     * ym >= 今月 → 今後の予定（本日を含む当月以降）、それより前 → 過去の月。
     */
    function splitMonthSheetsByCurrentMonth(sheetIds) {
      const cur = currentYmSix();
      const past = [];
      const upcoming = [];
      for (const ym of sheetIds) {
        if (!/^\d{6}$/.test(ym)) continue;
        if (ym >= cur) upcoming.push(ym);
        else past.push(ym);
      }
      past.sort((a, b) => b.localeCompare(a));
      upcoming.sort((a, b) => a.localeCompare(b));
      return { past, upcoming };
    }

    function csvLooksValid(text) {
      const t = String(text || "")
        .replace(/^\uFEFF/, "")
        .trimStart();
      if (!t || t.startsWith("<") || t.startsWith("<!")) return false;
      if (t.length < 2) return false;
      /* 1行だけの CSV や改行コード差でも弾かない */
      return t.includes(",") || t.includes("\t");
    }

    async function fetchSheetText(sheetName) {
      const res = await fetch(csvUrl(sheetName));
      if (!res.ok) return null;
      const text = await res.text();
      if (!csvLooksValid(text)) return null;
      return text;
    }

    async function sheetExists(sheetName) {
      const text = await fetchSheetText(sheetName);
      return text !== null;
    }

    async function discoverMonthSheets() {
      const cacheKey = `monthSheets_${SPREADSHEET_ID}_v4`;
      try {
        const raw = sessionStorage.getItem(cacheKey);
        if (raw) {
          const { list, ts } = JSON.parse(raw);
          if (
            Array.isArray(list) &&
            Date.now() - (ts || 0) < SHEET_LIST_CACHE_MS
          ) {
            return list;
          }
        }
      } catch (_) {
        /* ignore */
      }

      const candidates = sheetCandidatesForDiscovery();
      const batchSize = 6;
      const found = [];
      for (let i = 0; i < candidates.length; i += batchSize) {
        const chunk = candidates.slice(i, i + batchSize);
        const flags = await Promise.all(
          chunk.map((ym) => sheetExists(ym).then((ok) => (ok ? ym : null))),
        );
        for (const ym of flags) {
          if (ym) found.push(ym);
        }
      }
      const list = found.sort((a, b) => b.localeCompare(a));
      try {
        sessionStorage.setItem(
          cacheKey,
          JSON.stringify({ list, ts: Date.now() }),
        );
      } catch (_) {
        /* ignore */
      }
      return list;
    }

    /** 参加者は最大この人数ぶんの行を表示（空枠で埋める） */
    const MAX_PARTICIPANTS = 15;

    /**
     * シート上の行番号（1始まり）。
     * 1行目にタイトルがあり「2行目＝日付・3行目＝場所・4〜18行目＝名前」の場合は
     * dateRow:2, placeRow:3, nameStartRow:4 に変更してください。
     */
    const LAYOUT = {
      dateRow: 1,
      placeRow: 2,
      nameStartRow: 3,
      nameEndRow: 18,
    };

    function csvUrl(sheetName) {
      const q = new URLSearchParams({
        tqx: "out:csv",
        sheet: sheetName,
      });
      return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${q}`;
    }

    function gasWebAppBase() {
      const u = String(GAS_WEB_APP_URL || "").trim();
      if (!u) return "";
      return u.replace(/\/$/, "");
    }

    /**
     * GAS から { sessions } を取得（セル背景で初参加フラグ付き）。
     * URL 未設定・失敗時は null。
     */
    async function fetchSessionsViaGas(sheetName) {
      const base = gasWebAppBase();
      if (!base) return null;
      const url = `${base}?sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const j = await res.json();
        if (!j || j.ok !== true || !Array.isArray(j.sessions)) return null;
        return normalizeGasSessions(j.sessions);
      } catch (err) {
        console.warn("GAS fetch failed", err);
        return null;
      }
    }

    /** POST でも同じ API を叩ける（CORS で失敗する環境向けに GET を優先） */
    async function fetchSessionsViaGasPost(sheetName) {
      const base = gasWebAppBase();
      if (!base) return null;
      try {
        const res = await fetch(base, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sheet: sheetName }),
        });
        if (!res.ok) return null;
        const j = await res.json();
        if (!j || j.ok !== true || !Array.isArray(j.sessions)) return null;
        return normalizeGasSessions(j.sessions);
      } catch (err) {
        console.warn("GAS POST failed", err);
        return null;
      }
    }

    function normalizeGasSessions(raw) {
      return raw.map((s) => ({
        col: typeof s.col === "number" ? s.col : 0,
        date: String(s.date || "").trim(),
        place: s.place != null && String(s.place).trim() ? String(s.place).trim() : "—",
        slots: normalizeGasSlots(s.slots),
      }));
    }

    function normalizeGasSlots(slots) {
      const out = [];
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const sl = slots && slots[i] ? slots[i] : {};
        out.push({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: Boolean(sl.isFirst),
          isFemale: Boolean(sl.isFemale),
        });
      }
      return out;
    }

    function startOfLocalDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function sameLocalCalendarDay(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    /**
     * 日付セル（例: 4/15(水)、3月30日、2026/4/25）を Date にする。年は月シート名 YYYYMM を補完。
     */
    function parseSessionDateFromCell(dateStr, ymSix) {
      const t = String(dateStr || "")
        .normalize("NFKC")
        .trim();
      if (!t) return null;
      const ymd = t.match(
        /(\d{4})[\/\.\-年](\d{1,2})[\/\.\-月](\d{1,2})/,
      );
      if (ymd) {
        const dt = new Date(+ymd[1], +ymd[2] - 1, +ymd[3]);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const jp = t.match(/(\d{1,2})月(\d{1,2})日/);
      if (jp && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +jp[1] - 1;
        const da = +jp[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const md = t.match(/(\d{1,2})[\/．\.](\d{1,2})/);
      if (md && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +md[1] - 1;
        const da = +md[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      return null;
    }

    /**
     * 日付文字列が refDay の暦日と一致するか（パース失敗時のフォールバック）。
     */
    function dateCellLooksLikeCalendarDay(dateStr, refDay) {
      const t = String(dateStr || "").normalize("NFKC");
      if (!t || !refDay) return false;
      const y = refDay.getFullYear();
      const m = refDay.getMonth() + 1;
      const d = refDay.getDate();
      if (
        t.includes(`${y}年${m}月${d}日`) ||
        t.includes(`${y}/${m}/${d}`) ||
        t.includes(`${y}-${m}-${d}`)
      ) {
        return true;
      }
      const re = new RegExp(
        `(^|[^0-9])0*${m}[/.．月]0*${d}(?:日|[(（]|[^0-9]|$)`,
      );
      return re.test(t);
    }

    function sessionHitsTargetDay(s, targetDay, ymSix) {
      const dt = parseSessionDateFromCell(s.date, ymSix);
      if (dt && sameLocalCalendarDay(startOfLocalDay(dt), targetDay)) {
        return true;
      }
      return dateCellLooksLikeCalendarDay(s.date, targetDay);
    }

    /**
     * 本日の列、なければ「本日以降で最も近い日」の列だけ黄色強調。
     * 過去日のみのシートでは強調しない。
     */
    function annotateNearestSessions(sessions, ymSix) {
      if (!sessions || !sessions.length) return sessions;
      if (!ymSix || !/^\d{6}$/.test(ymSix)) return sessions;

      const today = startOfLocalDay(new Date());
      const rows = sessions.map((s) => ({
        s,
        dt: parseSessionDateFromCell(s.date, ymSix),
      }));

      const withDt = rows.filter((x) => x.dt);
      let targetDay = null;

      const onCalendarToday = rows.filter((x) =>
        sessionHitsTargetDay(x.s, today, ymSix),
      );
      if (onCalendarToday.length) {
        targetDay = today;
      } else if (withDt.length) {
        const futureOrToday = withDt
          .filter((x) => startOfLocalDay(x.dt) >= today)
          .sort((a, b) => a.dt - b.dt);
        if (futureOrToday.length) {
          targetDay = startOfLocalDay(futureOrToday[0].dt);
        }
      }

      if (!targetDay) {
        return sessions.map((s) => ({ ...s, highlightNext: false }));
      }

      return sessions.map((s) => ({
        ...s,
        highlightNext: sessionHitsTargetDay(s, targetDay, ymSix),
      }));
    }

    /** 簡易 CSV パーサ（ダブルクォート・エスケープ対応） */
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let i = 0;
      let inQuotes = false;

      while (i < text.length) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') {
              cell += '"';
              i += 2;
              continue;
            }
            inQuotes = false;
            i++;
            continue;
          }
          cell += c;
          i++;
          continue;
        }
        if (c === '"') {
          inQuotes = true;
          i++;
          continue;
        }
        if (c === ",") {
          row.push(cell);
          cell = "";
          i++;
          continue;
        }
        if (c === "\r") {
          i++;
          continue;
        }
        if (c === "\n") {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          i++;
          continue;
        }
        cell += c;
        i++;
      }
      row.push(cell);
      if (row.length > 1 || row[0] !== "") {
        rows.push(row);
      }
      return rows;
    }

    function formatSheetLabel(name) {
      const m = /^(\d{4})(\d{2})$/.exec(name.trim());
      if (!m) return name;
      const y = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10);
      return `${y}年${mo}月（${name}）`;
    }

    function idx1(n) {
      return n - 1;
    }

    function cell(rows, r, c) {
      if (!rows[r] || rows[r][c] === undefined) return "";
      const v = rows[r][c];
      return String(v).trim();
    }

    /** 表示用: 見えない文字・全角スペースだけのセルは空とみなす */
    function normalizeParticipantDisplay(s) {
      let t = String(s ?? "");
      t = t.normalize("NFKC");
      t = t.replace(/\u200b|\u200c|\u200d|\ufeff/g, "");
      t = t.replace(/\u00a0|\u3000/g, " ");
      t = t.replace(/\s+/g, " ").trim();
      return t;
    }

    function slotHasName(slot) {
      return Boolean(normalizeParticipantDisplay(slot.display));
    }

    function isSessionCountLabel(s) {
      return s === "開催回数" || s.startsWith("開催回数");
    }

    /**
     * シート上のメモ用表記を検出し、初参加なら強調用フラグを付ける。
     * 表示からは（初）などの装飾だけ除き、名前本体は残す。
     */
    function parseParticipantCell(raw) {
      const rawStr = normalizeParticipantDisplay(raw);
      if (!rawStr) {
        return { display: "", isFirst: false, isFemale: false };
      }
      let t = rawStr;
      let isFirst = false;
      const markers = [
        "【初参加】",
        "（初）",
        "(初)",
        "【初】",
        "初参加",
        "［初］",
        "[初]",
      ];
      for (const m of markers) {
        if (t.includes(m)) {
          isFirst = true;
          t = t.split(m).join("");
        }
      }
      if (/\bNEW\b/i.test(t)) {
        isFirst = true;
        t = t.replace(/\bNEW\b/gi, "");
      }
      t = t.replace(/\s{2,}/g, " ").trim();
      const display = normalizeParticipantDisplay(t) || rawStr;
      return { display, isFirst, isFemale: false };
    }

    /**
     * 参加者欄: nameStart から連続して MAX_PARTICIPANTS 行。
     * 「開催回数」以降は空枠。開催回数の文字自体は表示しない。
     */
    function collectNameSlots(rows, c, ns, ne) {
      const slots = [];
      let footer = false;
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const r = ns + i;
        if (footer || r > ne) {
          slots.push({ raw: "" });
          continue;
        }
        const raw = cell(rows, r, c);
        if (isSessionCountLabel(raw)) {
          footer = true;
          slots.push({ raw: "" });
          continue;
        }
        slots.push({ raw });
      }
      return slots.map(({ raw }) => parseParticipantCell(raw));
    }

    function normalizeKeyPart(s) {
      return String(s || "")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .trim();
    }

    function cloneSession(s) {
      return {
        col: s.col,
        date: s.date,
        place: s.place,
        slots: s.slots.map((sl) => ({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: sl.isFirst,
          isFemale: Boolean(sl.isFemale),
        })),
      };
    }

    /**
     * 「参加者」シートから名前を補完する。
     * 日付だけの一致は年をまたぐと誤爆するため、列まるごと置換は「日付＋場所」が一致するときのみ。
     * 日付のみ一致のときは、空のマスだけ埋める（既に名前があるセルは上書きしない）。
     */
    function mergeSessionsFromLookup(mainSessions, lookupSessions) {
      if (!lookupSessions || !lookupSessions.length) return mainSessions;

      const byDatePlace = new Map();
      const byDate = new Map();
      for (const s of lookupSessions) {
        const dk = normalizeKeyPart(s.date);
        const pk = normalizeKeyPart(s.place);
        if (dk && pk && pk !== "—") {
          byDatePlace.set(`${dk}\t${pk}`, s);
        }
        if (!dk) continue;
        if (!byDate.has(dk)) {
          byDate.set(dk, cloneSession(s));
          continue;
        }
        const prev = byDate.get(dk);
        const mergedLu = {
          ...prev,
          place: prev.place && prev.place !== "—" ? prev.place : s.place,
          slots: prev.slots.map((pa, i) => {
            const pb = s.slots[i];
            if (pa && slotHasName(pa)) {
              return {
                display: normalizeParticipantDisplay(pa.display),
                isFirst: Boolean(pa.isFirst),
                isFemale: Boolean(pa.isFemale),
              };
            }
            if (pb && slotHasName(pb)) {
              return {
                display: normalizeParticipantDisplay(pb.display),
                isFirst: Boolean(pb.isFirst),
                isFemale: Boolean(pb.isFemale),
              };
            }
            return { display: "", isFirst: false, isFemale: false };
          }),
        };
        byDate.set(dk, mergedLu);
      }

      function findStrict(date, place) {
        const dk = normalizeKeyPart(date);
        const pk = normalizeKeyPart(place);
        if (!dk || !pk || pk === "—") return null;
        return byDatePlace.get(`${dk}\t${pk}`) || null;
      }

      function findLooseByDate(date) {
        const dk = normalizeKeyPart(date);
        return dk ? byDate.get(dk) || null : null;
      }

      const out = mainSessions.map((s) => {
        const merged = cloneSession(s);
        const strict = findStrict(s.date, s.place);
        const loose = strict ? null : findLooseByDate(s.date);
        const luStrict = strict;
        const luLoose = loose;

        const mainEmpty = !merged.slots.some((x) => slotHasName(x));

        if (mainEmpty && luStrict) {
          merged.slots = luStrict.slots.map((sl) => ({
            display: normalizeParticipantDisplay(sl.display),
            isFirst: sl.isFirst,
            isFemale: Boolean(sl.isFemale),
          }));
          return merged;
        }

        const luForSlots = luStrict || luLoose;
        if (!luForSlots) return merged;

        merged.slots = merged.slots.map((slot, i) => {
          if (slotHasName(slot)) return slot;
          const f = luForSlots.slots[i];
          if (f && slotHasName(f)) {
            return {
              display: normalizeParticipantDisplay(f.display),
              isFirst: f.isFirst,
              isFemale: Boolean(f.isFemale),
            };
          }
          return slot;
        });
        return merged;
      });

      return out;
    }

    /**
     * 列ごとに { date, place, slots } を組み立てる。
     * 日付セルが空の列は含めない。
     */
    function buildSessions(rows) {
      const dr = idx1(LAYOUT.dateRow);
      const pr = idx1(LAYOUT.placeRow);
      const ns = idx1(LAYOUT.nameStartRow);
      const ne = idx1(LAYOUT.nameEndRow);

      const maxCol = Math.max(
        ...rows.map((r) => r.length),
        0,
      );

      const sessions = [];
      for (let c = 0; c < maxCol; c++) {
        const date = cell(rows, dr, c);
        if (!date) continue;

        const place = cell(rows, pr, c);
        const slots = collectNameSlots(rows, c, ns, ne);
        sessions.push({
          col: c,
          date,
          place: place || "—",
          slots,
        });
      }
      return sessions;
    }

    const statusEl = document.getElementById("status");
    const sessionsEl = document.getElementById("sessions");
    const selectPastEl = document.getElementById("sheet-select-past");
    const selectUpcomingEl = document.getElementById("sheet-select-upcoming");

    function setStatus(kind, message) {
      statusEl.className = "status is-visible";
      statusEl.textContent = message;
      statusEl.classList.toggle("status--loading", kind === "loading");
      statusEl.classList.toggle("status--error", kind === "error");
      if (kind === "hidden") {
        statusEl.classList.remove("is-visible");
      }
    }

    function renderSessions(sessions) {
      sessionsEl.innerHTML = "";
      if (!sessions.length) {
        sessionsEl.innerHTML =
          '<p class="empty-sheet">日付の入っている列がありません。LAYOUT の行番号をスプレッドシートに合わせて調整してください。</p>';
        return;
      }

      for (const s of sessions) {
        const card = document.createElement("article");
        card.className = "session";
        if (s.highlightNext) {
          card.classList.add("session--highlight-nearest");
        }

        const head = document.createElement("div");
        head.className = "session__head";

        const h2 = document.createElement("h2");
        h2.className = "session__date";
        h2.textContent = s.date;
        head.appendChild(h2);

        card.appendChild(head);

        const place = document.createElement("div");
        place.className = "session__place";
        place.innerHTML =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
        const placeText = document.createElement("span");
        placeText.textContent = s.place;
        place.appendChild(placeText);
        card.appendChild(place);

        const ul = document.createElement("ul");
        ul.className = "session__names";
        const hasAnyone = s.slots.some((x) => slotHasName(x));
        if (!hasAnyone) {
          const li = document.createElement("li");
          li.className = "session__row session__row--empty-row";
            li.innerHTML =
            '<span class="session__num" aria-hidden="true">—</span><span class="session__name">参加者なし</span>';
          ul.appendChild(li);
        } else {
          s.slots.forEach((slot, index) => {
            const li = document.createElement("li");
            const num = index + 1;
            const display = normalizeParticipantDisplay(slot.display);
            const empty = !display;
            li.className = "session__row";
            if (empty) li.classList.add("session__row--slot-empty");
            if (slot.isFirst && !empty) li.classList.add("session__row--first");
            if (slot.isFemale && !empty) li.classList.add("session__row--female");

            const numEl = document.createElement("span");
            numEl.className = "session__num";
            numEl.setAttribute("aria-hidden", "true");
            numEl.textContent = String(num);

            const nameEl = document.createElement("span");
            nameEl.className = "session__name";
            nameEl.textContent = display;

            li.appendChild(numEl);
            li.appendChild(nameEl);

            if (slot.isFirst && !empty) {
              const badge = document.createElement("span");
              badge.className = "session__badge";
              badge.textContent = "初";
              badge.title = "初参加";
              li.appendChild(badge);
            }

            if (slot.isFemale && !empty) {
              const fb = document.createElement("span");
              fb.className = "session__badge-female";
              fb.textContent = "女";
              fb.title = "女性";
              li.appendChild(fb);
            }

            ul.appendChild(li);
          });
        }
        card.appendChild(ul);
        sessionsEl.appendChild(card);
      }
    }

    async function loadSheet(sheetName) {
      setStatus("loading", "読み込み中…");
      sessionsEl.innerHTML = "";

      try {
        const useGas = Boolean(gasWebAppBase());
        let sessions = null;
        let lookupSessions = null;

        if (useGas) {
          const [mainG, lookupG] = await Promise.all([
            fetchSessionsViaGas(sheetName),
            fetchSessionsViaGas(LOOKUP_SHEET_NAME),
          ]);
          sessions = mainG;
          lookupSessions = lookupG;
          if (!sessions) {
            sessions = await fetchSessionsViaGasPost(sheetName);
          }
          if (!lookupSessions) {
            lookupSessions = await fetchSessionsViaGasPost(LOOKUP_SHEET_NAME);
          }
        }

        if (!sessions) {
          const mainText = await fetchSheetText(sheetName);
          if (!mainText) {
            throw new Error("main sheet empty or invalid");
          }
          const mainRows = parseCSV(mainText);
          sessions = buildSessions(mainRows);
        }

        if (!lookupSessions) {
          const lookupText = await fetchSheetText(LOOKUP_SHEET_NAME);
          if (lookupText) {
            const lookupRows = parseCSV(lookupText);
            lookupSessions = buildSessions(lookupRows);
          }
        }

        if (lookupSessions && lookupSessions.length) {
          sessions = mergeSessionsFromLookup(sessions, lookupSessions);
        }

        sessions = annotateNearestSessions(sessions, sheetName);

        setStatus("hidden", "");
        renderSessions(sessions);
      } catch (e) {
        setStatus(
          "error",
          `「${sheetName}」の取得に失敗しました。シート名・共有設定・ネットワークを確認してください。`,
        );
        console.error(e);
      }
    }

    /**
     * 過去／今後の2プルダウンを埋める。
     * 先頭に value="" の「—」を置き、どちらか一方だけ選択する想定。
     */
    function fillMonthSelects(pastIds, upcomingIds) {
      function fill(selectEl, ids, withBlank) {
        selectEl.innerHTML = "";
        if (!ids.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "（該当なし）";
          opt.disabled = true;
          selectEl.appendChild(opt);
          selectEl.disabled = true;
          return;
        }
        selectEl.disabled = false;
        if (withBlank) {
          const b = document.createElement("option");
          b.value = "";
          b.textContent = "—";
          selectEl.appendChild(b);
        }
        for (const name of ids) {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = formatSheetLabel(name);
          selectEl.appendChild(opt);
        }
      }

      const bothKinds = pastIds.length && upcomingIds.length;
      fill(selectPastEl, pastIds, bothKinds);
      fill(selectUpcomingEl, upcomingIds, bothKinds);
    }

    function wireSheetSelects() {
      const onChange = (source) => {
        const pv = selectPastEl.value;
        const uv = selectUpcomingEl.value;
        if (source === "past" && pv) {
          if (selectUpcomingEl.options.length && !selectUpcomingEl.disabled) {
            selectUpcomingEl.value = "";
          }
          loadSheet(pv);
          return;
        }
        if (source === "upcoming" && uv) {
          if (selectPastEl.options.length && !selectPastEl.disabled) {
            selectPastEl.value = "";
          }
          loadSheet(uv);
        }
      };
      selectPastEl.addEventListener("change", () => onChange("past"));
      selectUpcomingEl.addEventListener("change", () => onChange("upcoming"));
    }

    /** 初期表示で選ぶシート名（今後があれば最も近い月、なければ直近の過去） */
    function pickDefaultSheet(pastIds, upcomingIds) {
      if (upcomingIds.length) return upcomingIds[0];
      if (pastIds.length) return pastIds[0];
      return "";
    }

    async function bootstrap() {
      setStatus("loading", "スプレッドシート上のシートを確認中…");
      try {
        const list = await discoverMonthSheets();
        if (!list.length) {
          setStatus(
            "error",
            "表示できる月シート（YYYYMM）がありません。共有設定とシート名を確認してください。",
          );
          return;
        }
        const { past, upcoming } = splitMonthSheetsByCurrentMonth(list);
        fillMonthSelects(past, upcoming);
        wireSheetSelects();
        const defaultName = pickDefaultSheet(past, upcoming);
        if (!defaultName) {
          setStatus("error", "表示できる月シートがありません。");
          return;
        }
        if (upcoming.length) {
          selectUpcomingEl.value = defaultName;
        } else {
          selectPastEl.value = defaultName;
        }
        setStatus("hidden", "");
        await loadSheet(defaultName);
      } catch (e) {
        setStatus("error", "初期化に失敗しました。ネットワークを確認してください。");
        console.error(e);
      }
    }

    bootstrap();
  </script>
