<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NORTH PINE カレンダー</title>
  <meta name="description" content="NORTH PINEの練習日程・参加者一覧（当月・来月・19:15～21:45）" />
  <meta property="og:title" content="NORTH PINE カレンダー" />
  <meta property="og:description" content="練習日程と参加者状況を確認できます（当月・来月）" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="NORTH PINE カレンダー" />
  <meta name="twitter:description" content="練習日程と参加者状況を確認できます" />
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>NORTH PINE カレンダー</h1>
        <p id="periodLabel" class="subtitle">読み込み中…</p>
      </div>
      <button type="button" id="btnRefresh" class="btn-refresh" title="スプレッドシートから再取得">
        更新
      </button>
    </div>
    <div class="header-action-bar">
      <a
        href="https://www.instagram.com/direct/t/17842823258937214/"
        class="btn-header-link btn-header-link--instagram"
        target="_blank"
        rel="noopener noreferrer"
      >参加連絡はこちら</a>
      <a
        href="https://www.youtube.com/playlist?list=PL_vW5rmDDp-GFSQ8oeXUD_171uDtn1Bqg"
        class="btn-header-link btn-header-link--youtube"
        target="_blank"
        rel="noopener noreferrer"
      >Youtube</a>
    </div>
    <noscript>
      <p style="margin:0.5rem 0 0;font-size:0.85rem;">JavaScriptを有効にすると日程が表示されます。</p>
    </noscript>
  </header>

  <main>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="errorArea"></div>
    <div id="loadingArea" class="loading-panel" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p>カレンダーを読み込んでいます…</p>
    </div>
    <div id="calendarArea" class="calendars" style="display:none;"></div>
  </main>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
      <div id="modalLoading" class="modal-loading" role="status" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <span>読み込み中…</span>
      </div>
      <div class="modal-header">
        <div class="modal-header-top">
          <div>
            <div class="modal-title-row">
              <h2 id="modalTitle">詳細</h2>
              <span id="modalTimeSlot" class="modal-time-slot"></span>
            </div>
            <div id="modalPlace" class="modal-place"></div>
          </div>
          <button type="button" class="close-btn" id="closeModalBtn" aria-label="閉じる">&times;</button>
        </div>
        <p id="modalCount" class="modal-count"></p>
      </div>
      <div class="modal-body">
        <h3 class="section-label">参加者一覧</h3>
        <ul id="participantList" class="participant-list"></ul>
        <p id="modalFormMessage" class="form-message"></p>
      </div>
    </div>
  </div>

  <script src="js/calendar.js"></script>
</body>
</html>
