<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NORTH PINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>NORTH PINE 参加者リスト</h1>
        <p>今後の予定のみ表示します。更新ボタンでスプレッドシートから再取得できます。</p>
      </div>
      <div class="controls controls-row">
        <div class="controls__group controls__group--schedule">
          <label>今後の予定</label>
          <div class="controls__schedule-row">
            <button type="button" id="btn-refresh-bundle" class="btn-refresh" title="スプレッドシートから再取得">
              更新
            </button>
          </div>
        </div>
      </div>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div class="sessions-scroll">
      <div id="sessions" class="sessions"></div>
    </div>

    <footer>データは Google スプレッドシートから取得しています。</footer>
  </div>

  <script>
    /** スプレッドシート ID */
    const SPREADSHEET_ID = "1-07mnQUToyJjD2pNau99a0dCLmg_0chswzvv3eW4t30";

    /**
     * 月次シートのほかに参照するシート名（過去回の名前など）。
     * 存在しない場合は無視されます。
     */
    const LOOKUP_SHEET_NAME = "参加者";

    /**
     * 左から1枚目のシート gid（シートを開いたときの URL の gid=。先頭タブは多くの場合 0）
     */
    const CSV_TAB1_GID = 0;
    /**
     * 本日が 23 日以降に読む 2 枚目の gid。空のままなら 2 枚目は取得しない（URL の gid= の数値を貼る）
     */
    const CSV_TAB2_GID = "";

    /**
     * ローカル日付の「今月」から、最大何ヶ月先まで YYYYMM シートの存在確認をするか。
     * 過去月はプローブしない。
     */
    const SHEET_PROBE_FUTURE_MONTHS = 24;

    /** 日程プラン構築時に同時取得する月シート数（多すぎるとブラウザ・スプレッドシート側に負荷） */
    const SHEET_FETCH_CONCURRENCY = 5;

    /** シート一覧のキャッシュ（ミリ秒） */
    const SHEET_LIST_CACHE_MS = 60 * 60 * 1000;

    /** タブ CSV まとめ取得の IndexedDB キャッシュ TTL */
    const BUNDLE_CACHE_TTL_MS = 10 * 60 * 1000;
    const BUNDLE_IDB_NAME = "north-pine-viewer";
    const BUNDLE_IDB_STORE = "gasBundle";

    function sheetNamesRange(fromYear, fromMonth, toYear, toMonth) {
      const out = [];
      let y = fromYear;
      let m = fromMonth;
      while (y < toYear || (y === toYear && m <= toMonth)) {
        out.push(`${y}${String(m).padStart(2, "0")}`);
        m += 1;
        if (m > 12) {
          m = 1;
          y += 1;
        }
      }
      return out;
    }

    /** ローカル日付の「今月」を YYYYMM（シート名と比較用） */
    function currentYmSix() {
      const n = new Date();
      return `${n.getFullYear()}${String(n.getMonth() + 1).padStart(2, "0")}`;
    }

    /** 指定 YYYYMM の翌月（タブ2枚目＝次月プレビュー用の日付補完キー） */
    function ymSixPlusOneMonth(ymSix) {
      if (!/^\d{6}$/.test(ymSix)) return currentYmSix();
      const y = +ymSix.slice(0, 4);
      const m = +ymSix.slice(4, 6) - 1;
      const d = new Date(y, m + 1, 1);
      return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    /** 今月から未来 N ヶ月までの YYYYMM 候補のみ（過去月は試さない） */
    function sheetCandidatesForDiscovery() {
      const now = new Date();
      const ty = now.getFullYear();
      const tm = now.getMonth() + 1;
      let endY = ty;
      let endM = tm + SHEET_PROBE_FUTURE_MONTHS;
      while (endM > 12) {
        endM -= 12;
        endY += 1;
      }
      return sheetNamesRange(ty, tm, endY, endM);
    }

    function csvLooksValid(text) {
      const t = String(text || "")
        .replace(/^\uFEFF/, "")
        .trimStart();
      if (!t || t.startsWith("<") || t.startsWith("<!")) return false;
      if (t.length < 2) return false;
      /* 1行だけの CSV や改行コード差でも弾かない */
      return t.includes(",") || t.includes("\t");
    }

    async function fetchSheetText(sheetName) {
      const res = await fetch(csvUrl(sheetName));
      if (!res.ok) return null;
      const text = await res.text();
      if (!csvLooksValid(text)) return null;
      return text;
    }

    /** 公開エクスポート CSV（gid はシート URL の gid=） */
    async function fetchSheetTextByGid(gid) {
      const g = String(gid);
      if (!/^\d+$/.test(g)) return null;
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${encodeURIComponent(g)}`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const text = await res.text();
      if (!csvLooksValid(text)) return null;
      return text;
    }

    async function sheetExists(sheetName) {
      const text = await fetchSheetText(sheetName);
      return text !== null;
    }

    async function discoverMonthSheets() {
      const cacheKey = `monthSheets_${SPREADSHEET_ID}_v7`;
      try {
        const raw = sessionStorage.getItem(cacheKey);
        if (raw) {
          const { list, ts } = JSON.parse(raw);
          if (
            Array.isArray(list) &&
            Date.now() - (ts || 0) < SHEET_LIST_CACHE_MS
          ) {
            return list;
          }
        }
      } catch (_) {
        /* ignore */
      }

      const candidates = sheetCandidatesForDiscovery();
      const batchSize = 6;
      const found = [];
      for (let i = 0; i < candidates.length; i += batchSize) {
        const chunk = candidates.slice(i, i + batchSize);
        const flags = await Promise.all(
          chunk.map((ym) => sheetExists(ym).then((ok) => (ok ? ym : null))),
        );
        for (const ym of flags) {
          if (ym) found.push(ym);
        }
      }
      const list = found.sort((a, b) => b.localeCompare(a));
      try {
        sessionStorage.setItem(
          cacheKey,
          JSON.stringify({ list, ts: Date.now() }),
        );
      } catch (_) {
        /* ignore */
      }
      return list;
    }

    /** 参加者は最大この人数ぶんの行を表示（空枠で埋める） */
    const MAX_PARTICIPANTS = 15;

    /**
     * シート上の行番号（1始まり）。
     * 1行目にタイトルがあり「2行目＝日付・3行目＝場所・4〜18行目＝名前」の場合は
     * dateRow:2, placeRow:3, nameStartRow:4 に変更してください。
     */
    const LAYOUT = {
      dateRow: 1,
      placeRow: 2,
      nameStartRow: 3,
      nameEndRow: 18,
    };

    function csvUrl(sheetName) {
      const q = new URLSearchParams({
        tqx: "out:csv",
        sheet: sheetName,
      });
      return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${q}`;
    }

    function normalizeGasSessions(raw) {
      return raw.map((s) => {
        const colNum =
          typeof s.col === "number"
            ? s.col
            : parseInt(String(s.col ?? ""), 10);
        return {
          col: Number.isFinite(colNum) ? colNum : 0,
          date: String(s.date || "").trim(),
          place:
            s.place != null && String(s.place).trim()
              ? String(s.place).trim()
              : "—",
          slots: normalizeGasSlots(s.slots),
          recordDateParse: Boolean(s.recordDateParse),
        };
      });
    }

    function normalizeGasSlots(slots) {
      const out = [];
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const sl = slots && slots[i] ? slots[i] : {};
        out.push({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: Boolean(sl.isFirst),
          isFemale: Boolean(sl.isFemale),
          isUnconfirmed: Boolean(sl.isUnconfirmed),
        });
      }
      return out;
    }

    function startOfLocalDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    /**
     * 日付セル（例: 4/15(水)、3月30日、2026/4/25）を Date にする。年は月シート名 YYYYMM を補完。
     */
    function parseSessionDateFromCell(dateStr, ymSix) {
      const raw = String(dateStr || "")
        .normalize("NFKC")
        .trim();
      if (!raw) return null;
      const ymd = raw.match(
        /(\d{4})[\/\.\-年](\d{1,2})[\/\.\-月](\d{1,2})/,
      );
      if (ymd) {
        const dt = new Date(+ymd[1], +ymd[2] - 1, +ymd[3]);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const t = raw
        .replace(/\([^)]*\)/g, "")
        .replace(/（[^）]*）/g, "")
        .replace(/\s+/g, " ")
        .trim();
      const jp = t.match(/(\d{1,2})月(\d{1,2})日/);
      if (jp && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +jp[1] - 1;
        const da = +jp[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const md = t.match(/(\d{1,2})[\/．\.](\d{1,2})/);
      if (md && ymSix && /^\d{6}$/.test(ymSix)) {
        const yy = +ymSix.slice(0, 4);
        const mo = +md[1] - 1;
        const da = +md[2];
        const dt = new Date(yy, mo, da);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      return null;
    }

    /** record 用: 月シート名がないとき、日付のみ表記の年を当てるための YYYYMM 候補（過去〜未来） */
    function ymHintsAroundNow() {
      const keys = [];
      const n = new Date();
      for (let k = -36; k <= 72; k++) {
        const d = new Date(n.getFullYear(), n.getMonth() + k, 1);
        keys.push(
          `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}`,
        );
      }
      return keys;
    }

    /**
     * record シート等で、B 列が「年付き」ならそのまま解釈。
     * 月日のみのときは ym 候補のうち「今日以降で最も早い」解釈を採用（過去日は除外しやすくする）。
     */
    function parseSessionDateFromCellBest(dateStr) {
      const raw = String(dateStr || "").normalize("NFKC").trim();
      if (!raw) return null;
      const ymd = raw.match(
        /(\d{4})[\/\.\-年](\d{1,2})[\/\.\-月](\d{1,2})/,
      );
      if (ymd) {
        const dt = new Date(+ymd[1], +ymd[2] - 1, +ymd[3]);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }
      const today = startOfLocalDay(new Date());
      let best = null;
      let bestT = Infinity;
      for (const ym of ymHintsAroundNow()) {
        const dt = parseSessionDateFromCell(dateStr, ym);
        if (!dt) continue;
        const sod = startOfLocalDay(dt);
        if (sod < today) continue;
        const ts = sod.getTime();
        if (ts < bestT) {
          bestT = ts;
          best = dt;
        }
      }
      return best;
    }

    /** 簡易 CSV パーサ（ダブルクォート・エスケープ対応） */
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let i = 0;
      let inQuotes = false;

      while (i < text.length) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') {
              cell += '"';
              i += 2;
              continue;
            }
            inQuotes = false;
            i++;
            continue;
          }
          cell += c;
          i++;
          continue;
        }
        if (c === '"') {
          inQuotes = true;
          i++;
          continue;
        }
        if (c === ",") {
          row.push(cell);
          cell = "";
          i++;
          continue;
        }
        if (c === "\r") {
          i++;
          continue;
        }
        if (c === "\n") {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          i++;
          continue;
        }
        cell += c;
        i++;
      }
      row.push(cell);
      if (row.length > 1 || row[0] !== "") {
        rows.push(row);
      }
      return rows;
    }

    function formatSheetLabel(name) {
      const m = /^(\d{4})(\d{2})$/.exec(name.trim());
      if (!m) return name;
      const y = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10);
      return `${y}年${mo}月（${name}）`;
    }

    function idx1(n) {
      return n - 1;
    }

    function cell(rows, r, c) {
      if (!rows[r] || rows[r][c] === undefined) return "";
      const v = rows[r][c];
      return String(v).trim();
    }

    /** 表示用: 見えない文字・全角スペースだけのセルは空とみなす */
    function normalizeParticipantDisplay(s) {
      let t = String(s ?? "");
      t = t.normalize("NFKC");
      t = t.replace(/\u200b|\u200c|\u200d|\ufeff/g, "");
      t = t.replace(/\u00a0|\u3000/g, " ");
      t = t.replace(/\s+/g, " ").trim();
      return t;
    }

    function slotHasName(slot) {
      return Boolean(normalizeParticipantDisplay(slot.display));
    }

    function isSessionCountLabel(s) {
      return s === "開催回数" || s.startsWith("開催回数");
    }

    /**
     * シート上のメモ用表記を検出し、初参加なら強調用フラグを付ける。
     * 表示からは（初）などの装飾だけ除き、名前本体は残す。
     */
    function parseParticipantCell(raw) {
      const rawStr = normalizeParticipantDisplay(raw);
      if (!rawStr) {
        return {
          display: "",
          isFirst: false,
          isFemale: false,
          isUnconfirmed: false,
        };
      }
      let t = rawStr;
      let isFirst = false;
      const markers = [
        "【初参加】",
        "（初）",
        "(初)",
        "【初】",
        "初参加",
        "［初］",
        "[初]",
      ];
      for (const m of markers) {
        if (t.includes(m)) {
          isFirst = true;
          t = t.split(m).join("");
        }
      }
      if (/\bNEW\b/i.test(t)) {
        isFirst = true;
        t = t.replace(/\bNEW\b/gi, "");
      }
      t = t.replace(/\s{2,}/g, " ").trim();
      const display = normalizeParticipantDisplay(t) || rawStr;
      return { display, isFirst, isFemale: false, isUnconfirmed: false };
    }

    /**
     * 参加者欄: nameStart から連続して MAX_PARTICIPANTS 行。
     * 「開催回数」以降は空枠。開催回数の文字自体は表示しない。
     */
    function collectNameSlots(rows, c, ns, ne) {
      const slots = [];
      let footer = false;
      for (let i = 0; i < MAX_PARTICIPANTS; i++) {
        const r = ns + i;
        if (footer || r > ne) {
          slots.push({ raw: "" });
          continue;
        }
        const raw = cell(rows, r, c);
        if (isSessionCountLabel(raw)) {
          footer = true;
          slots.push({ raw: "" });
          continue;
        }
        slots.push({ raw });
      }
      return slots.map(({ raw }) => parseParticipantCell(raw));
    }

    function normalizeKeyPart(s) {
      return String(s || "")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .trim();
    }

    function cloneSession(s) {
      return {
        col: s.col,
        date: s.date,
        place: s.place,
        recordDateParse: Boolean(s.recordDateParse),
        slots: s.slots.map((sl) => ({
          display: normalizeParticipantDisplay(sl.display),
          isFirst: sl.isFirst,
          isFemale: Boolean(sl.isFemale),
          isUnconfirmed: Boolean(sl.isUnconfirmed),
        })),
      };
    }

    /**
     * 「参加者」シートから名前を補完する。
     * 日付だけの一致は年をまたぐと誤爆するため、列まるごと置換は「日付＋場所」が一致するときのみ。
     * 日付のみ一致のときは、空のマスだけ埋める（既に名前があるセルは上書きしない）。
     */
    function mergeSessionsFromLookup(mainSessions, lookupSessions) {
      if (!lookupSessions || !lookupSessions.length) return mainSessions;

      const byDatePlace = new Map();
      const byDate = new Map();
      for (const s of lookupSessions) {
        const dk = normalizeKeyPart(s.date);
        const pk = normalizeKeyPart(s.place);
        if (dk && pk && pk !== "—") {
          byDatePlace.set(`${dk}\t${pk}`, s);
        }
        if (!dk) continue;
        if (!byDate.has(dk)) {
          byDate.set(dk, cloneSession(s));
          continue;
        }
        const prev = byDate.get(dk);
        const mergedLu = {
          ...prev,
          place: prev.place && prev.place !== "—" ? prev.place : s.place,
          slots: prev.slots.map((pa, i) => {
            const pb = s.slots[i];
            if (pa && slotHasName(pa)) {
              return {
                display: normalizeParticipantDisplay(pa.display),
                isFirst: Boolean(pa.isFirst),
                isFemale: Boolean(pa.isFemale),
                isUnconfirmed: Boolean(pa.isUnconfirmed),
              };
            }
            if (pb && slotHasName(pb)) {
              return {
                display: normalizeParticipantDisplay(pb.display),
                isFirst: Boolean(pb.isFirst),
                isFemale: Boolean(pb.isFemale),
                isUnconfirmed: Boolean(pb.isUnconfirmed),
              };
            }
            return {
              display: "",
              isFirst: false,
              isFemale: false,
              isUnconfirmed: false,
            };
          }),
        };
        byDate.set(dk, mergedLu);
      }

      function findStrict(date, place) {
        const dk = normalizeKeyPart(date);
        const pk = normalizeKeyPart(place);
        if (!dk || !pk || pk === "—") return null;
        return byDatePlace.get(`${dk}\t${pk}`) || null;
      }

      function findLooseByDate(date) {
        const dk = normalizeKeyPart(date);
        return dk ? byDate.get(dk) || null : null;
      }

      const out = mainSessions.map((s) => {
        const merged = cloneSession(s);
        const strict = findStrict(s.date, s.place);
        const loose = strict ? null : findLooseByDate(s.date);
        const luStrict = strict;
        const luLoose = loose;

        const mainEmpty = !merged.slots.some((x) => slotHasName(x));

        if (mainEmpty && luStrict) {
          merged.slots = luStrict.slots.map((sl) => ({
            display: normalizeParticipantDisplay(sl.display),
            isFirst: sl.isFirst,
            isFemale: Boolean(sl.isFemale),
            isUnconfirmed: Boolean(sl.isUnconfirmed),
          }));
          return merged;
        }

        const luForSlots = luStrict || luLoose;
        if (!luForSlots) return merged;

        merged.slots = merged.slots.map((slot, i) => {
          if (slotHasName(slot)) return slot;
          const f = luForSlots.slots[i];
          if (f && slotHasName(f)) {
            return {
              display: normalizeParticipantDisplay(f.display),
              isFirst: f.isFirst,
              isFemale: Boolean(f.isFemale),
              isUnconfirmed: Boolean(f.isUnconfirmed),
            };
          }
          return slot;
        });
        return merged;
      });

      return out;
    }

    /** Google スプレッドシートのチェックボックス列（CSV は TRUE / FALSE） */
    function parseCheckboxCell(v) {
      const t = String(v ?? "")
        .normalize("NFKC")
        .trim()
        .toUpperCase();
      return (
        t === "TRUE" ||
        t === "1" ||
        t === "YES" ||
        t === "はい" ||
        t === "✓" ||
        t === "☑"
      );
    }

    /**
     * シート「record」形式（1行目見出し推奨: A=連番, B=日付, …）。
     * A:1〜15, B:日付, C:場所, D:名前, E:初参加, F:女性, G:未確認
     */
    function looksLikeRecordSheetRows(rows) {
      if (!rows || rows.length < 2) return false;
      const r0 = rows[0];
      const a0 = String(r0[0] ?? "").normalize("NFKC").trim();
      const b0 = String(r0[1] ?? "").normalize("NFKC").trim();
      if (b0.includes("日付")) return true;
      if (a0 === "連番" || a0.includes("連番")) return true;
      return false;
    }

    function buildSessionsFromRecordRows(rows) {
      const start = looksLikeRecordSheetRows(rows) ? 1 : 0;
      const groups = new Map();

      for (let r = start; r < rows.length; r++) {
        const row = rows[r] || [];
        const dateRaw = String(row[1] ?? "").trim();
        if (!dateRaw) continue;
        const placeRaw = String(row[2] ?? "").trim() || "—";
        const key = `${normalizeKeyPart(dateRaw)}\t${normalizeKeyPart(placeRaw)}`;
        if (!groups.has(key)) {
          groups.set(key, {
            date: dateRaw,
            place: placeRaw || "—",
            bySeq: new Map(),
            minRow: r,
          });
        }
        const g = groups.get(key);
        g.minRow = Math.min(g.minRow, r);
        const seq = parseInt(String(row[0] ?? "").trim(), 10);
        const slotIndex =
          Number.isFinite(seq) && seq >= 1 && seq <= MAX_PARTICIPANTS
            ? seq - 1
            : null;
        if (slotIndex === null) continue;

        const parsed = parseParticipantCell(row[3]);
        const fromCb = {
          isFirst: parseCheckboxCell(row[4]),
          isFemale: parseCheckboxCell(row[5]),
          isUnconfirmed: parseCheckboxCell(row[6]),
        };
        g.bySeq.set(slotIndex, {
          display: parsed.display,
          isFirst: Boolean(parsed.isFirst || fromCb.isFirst),
          isFemale: Boolean(parsed.isFemale || fromCb.isFemale),
          isUnconfirmed: fromCb.isUnconfirmed,
        });
      }

      const emptySlot = () => ({
        display: "",
        isFirst: false,
        isFemale: false,
        isUnconfirmed: false,
      });
      const sessions = [];
      for (const g of groups.values()) {
        const slots = [];
        for (let i = 0; i < MAX_PARTICIPANTS; i++) {
          slots.push(g.bySeq.has(i) ? g.bySeq.get(i) : emptySlot());
        }
        sessions.push({
          col: g.minRow,
          date: g.date,
          place: g.place,
          slots,
          recordDateParse: true,
        });
      }

      sessions.sort((a, b) => {
        const da = parseSessionDateFromCellBest(a.date);
        const db = parseSessionDateFromCellBest(b.date);
        const ta = da ? startOfLocalDay(da).getTime() : 0;
        const tb = db ? startOfLocalDay(db).getTime() : 0;
        if (ta !== tb) return ta - tb;
        const pa = normalizeKeyPart(a.place).localeCompare(
          normalizeKeyPart(b.place),
        );
        if (pa !== 0) return pa;
        return a.col - b.col;
      });
      sessions.forEach((s, i) => {
        s.col = i;
      });
      return sessions;
    }

    /**
     * 列ごとに { date, place, slots } を組み立てる。
     * 日付セルが空の列は含めない。
     */
    function buildSessions(rows) {
      const dr = idx1(LAYOUT.dateRow);
      const pr = idx1(LAYOUT.placeRow);
      const ns = idx1(LAYOUT.nameStartRow);
      const ne = idx1(LAYOUT.nameEndRow);

      const maxCol = Math.max(
        ...rows.map((r) => r.length),
        0,
      );

      const sessions = [];
      for (let c = 0; c < maxCol; c++) {
        const date = cell(rows, dr, c);
        if (!date) continue;

        const place = cell(rows, pr, c);
        const slots = collectNameSlots(rows, c, ns, ne);
        sessions.push({
          col: c,
          date,
          place: place || "—",
          slots,
        });
      }
      return sessions;
    }

    const statusEl = document.getElementById("status");
    const sessionsEl = document.getElementById("sessions");
    const sessionsScrollEl = document.querySelector(".sessions-scroll");
    const btnRefreshBundleEl = document.getElementById("btn-refresh-bundle");

    /** 全月シート読み込み後の { sheetName, session, dt } プラン */
    let sessionPlan = null;

    function setStatus(kind, message) {
      statusEl.className = "status is-visible";
      statusEl.textContent = message;
      statusEl.classList.toggle("status--loading", kind === "loading");
      statusEl.classList.toggle("status--error", kind === "error");
      if (kind === "hidden") {
        statusEl.classList.remove("is-visible");
      }
    }

    function renderSessions(sessions, emptyHint) {
      sessionsEl.innerHTML = "";
      if (!sessions.length) {
        const p = document.createElement("p");
        p.className = "empty-sheet";
        p.textContent =
          emptyHint ||
          "日付の入っている列がありません。LAYOUT の行番号をスプレッドシートに合わせて調整してください。";
        sessionsEl.appendChild(p);
        return;
      }

      for (const s of sessions) {
        const card = document.createElement("article");
        card.className = "session";

        const head = document.createElement("div");
        head.className = "session__head";

        const h2 = document.createElement("h2");
        h2.className = "session__date";
        h2.textContent = s.date;
        head.appendChild(h2);

        card.appendChild(head);

        const place = document.createElement("div");
        place.className = "session__place";
        place.innerHTML =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
        const placeText = document.createElement("span");
        placeText.textContent = s.place;
        place.appendChild(placeText);
        card.appendChild(place);

        const ul = document.createElement("ul");
        ul.className = "session__names";
        const hasAnyone = s.slots.some((x) => slotHasName(x));
        if (!hasAnyone) {
          const li = document.createElement("li");
          li.className = "session__row session__row--empty-row";
            li.innerHTML =
            '<span class="session__num" aria-hidden="true">—</span><span class="session__name">参加者なし</span>';
          ul.appendChild(li);
        } else {
          s.slots.forEach((slot, index) => {
            const li = document.createElement("li");
            const num = index + 1;
            const display = normalizeParticipantDisplay(slot.display);
            const empty = !display;
            li.className = "session__row";
            if (empty) li.classList.add("session__row--slot-empty");
            if (slot.isFirst && !empty) li.classList.add("session__row--first");
            if (slot.isFemale && !empty) li.classList.add("session__row--female");
            if (slot.isUnconfirmed && !empty) {
              li.classList.add("session__row--unconfirmed");
            }

            const numEl = document.createElement("span");
            numEl.className = "session__num";
            numEl.setAttribute("aria-hidden", "true");
            numEl.textContent = String(num);

            const nameEl = document.createElement("span");
            nameEl.className = "session__name";
            nameEl.textContent = display;

            li.appendChild(numEl);
            li.appendChild(nameEl);

            if (slot.isFirst && !empty) {
              const badge = document.createElement("span");
              badge.className = "session__badge";
              badge.textContent = "初";
              badge.title = "初参加";
              li.appendChild(badge);
            }

            if (slot.isFemale && !empty) {
              const fb = document.createElement("span");
              fb.className = "session__badge-female";
              fb.textContent = "女";
              fb.title = "女性";
              li.appendChild(fb);
            }

            if (slot.isUnconfirmed && !empty) {
              const ub = document.createElement("span");
              ub.className = "session__badge-unconfirmed";
              ub.textContent = "未";
              ub.title = "未確認";
              li.appendChild(ub);
            }

            ul.appendChild(li);
          });
        }
        card.appendChild(ul);
        sessionsEl.appendChild(card);
      }
    }

    async function fetchLookupSessionsOnce() {
      const lookupText = await fetchSheetText(LOOKUP_SHEET_NAME);
      if (!lookupText || !csvLooksValid(lookupText)) return null;
      const lookupSessions = buildSessions(parseCSV(lookupText));
      return lookupSessions && lookupSessions.length ? lookupSessions : null;
    }

    /** 1 枚の月シートのセッション（参加者シートとマージ済み） */
    async function fetchMergedSessionsForSheet(sheetName, lookupSessions) {
      const mainText = await fetchSheetText(sheetName);
      if (!mainText || !csvLooksValid(mainText)) return [];
      let sessions = buildSessions(parseCSV(mainText));
      if (lookupSessions && lookupSessions.length) {
        sessions = mergeSessionsFromLookup(sessions, lookupSessions);
      }
      return sessions;
    }

    function scrollSessionsToStart() {
      if (sessionsScrollEl) sessionsScrollEl.scrollLeft = 0;
    }

    /** タブ CSV 用 IndexedDB キー（日付・1/2枚・gid 設定で無効化） */
    function bundleTabCacheKey(includeSecond) {
      const d = new Date();
      const day = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
      const g2 = String(CSV_TAB2_GID || "").trim();
      return `bundle_tabs_${SPREADSHEET_ID}_v8_${day}_${includeSecond ? "2" : "1"}_${CSV_TAB1_GID}_${g2}`;
    }

    function openBundleIdb_() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(BUNDLE_IDB_NAME, 1);
        req.onerror = () => reject(req.error);
        req.onupgradeneeded = () => {
          if (!req.result.objectStoreNames.contains(BUNDLE_IDB_STORE)) {
            req.result.createObjectStore(BUNDLE_IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
      });
    }

    async function readBundleCache(cacheKey) {
      try {
        const db = await openBundleIdb_();
        const row = await new Promise((resolve) => {
          const tx = db.transaction(BUNDLE_IDB_STORE, "readonly");
          const g = tx.objectStore(BUNDLE_IDB_STORE).get(cacheKey);
          g.onsuccess = () => resolve(g.result || null);
          g.onerror = () => resolve(null);
        });
        db.close();
        if (!row || typeof row.ts !== "number" || !row.payload) return null;
        if (Date.now() - row.ts > BUNDLE_CACHE_TTL_MS) return null;
        return row.payload;
      } catch (_) {
        return null;
      }
    }

    async function writeBundleCache(cacheKey, payload) {
      try {
        const db = await openBundleIdb_();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(BUNDLE_IDB_STORE, "readwrite");
          tx.objectStore(BUNDLE_IDB_STORE).put(
            { ts: Date.now(), payload },
            cacheKey,
          );
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
        db.close();
      } catch (_) {
        /* ignore */
      }
    }

    async function clearBundleCache() {
      try {
        const db = await openBundleIdb_();
        await new Promise((resolve) => {
          const tx = db.transaction(BUNDLE_IDB_STORE, "readwrite");
          tx.objectStore(BUNDLE_IDB_STORE).clear();
          tx.oncomplete = () => resolve();
          tx.onerror = () => resolve();
        });
        db.close();
      } catch (_) {
        /* ignore */
      }
    }

    /**
     * export CSV で 1 枚目（必須）＋条件付き 2 枚目と参加者シートを取得し、既存の tab bundle 組み立て用 JSON にする。
     */
    async function fetchCsvTabBundleJson(includeSecond) {
      const gid1 = Number(CSV_TAB1_GID);
      if (!Number.isFinite(gid1)) return null;
      const gid2Str = String(CSV_TAB2_GID || "").trim();
      const gid2Parsed = gid2Str === "" ? NaN : Number(gid2Str);
      const wantSecond =
        includeSecond &&
        gid2Str !== "" &&
        Number.isFinite(gid2Parsed);

      const p1 = fetchSheetTextByGid(String(gid1));
      const pLookup = fetchSheetText(LOOKUP_SHEET_NAME);
      const p2 = wantSecond
        ? fetchSheetTextByGid(String(gid2Parsed))
        : Promise.resolve(null);
      const [t1, lookupText, t2] = await Promise.all([p1, pLookup, p2]);

      let lookupSessions = [];
      if (lookupText && csvLooksValid(lookupText)) {
        lookupSessions = buildSessions(parseCSV(lookupText));
      }

      function sessionsFromTabCsv(text) {
        const rows = parseCSV(text);
        if (looksLikeRecordSheetRows(rows)) {
          return {
            sessions: buildSessionsFromRecordRows(rows),
            recordLayout: true,
          };
        }
        return {
          sessions: buildSessions(rows),
          recordLayout: false,
        };
      }

      const sheets = [];
      if (t1 && csvLooksValid(t1)) {
        const s1 = sessionsFromTabCsv(t1);
        sheets.push({
          tabIndex: 0,
          sessions: s1.sessions,
          recordLayout: s1.recordLayout,
        });
      }
      if (wantSecond && t2 && csvLooksValid(t2)) {
        const s2 = sessionsFromTabCsv(t2);
        sheets.push({
          tabIndex: 1,
          sessions: s2.sessions,
          recordLayout: s2.recordLayout,
        });
      }
      if (!sheets.length) return null;

      return {
        ok: true,
        bundle: true,
        tabMode: true,
        sheets,
        lookup: {
          sheet: LOOKUP_SHEET_NAME,
          sessions: lookupSessions,
        },
      };
    }

    /**
     * タブ順 bundle（sheets は配列）→ sessionPlan。
     * 1枚目は currentYmSix、2枚目はその翌月を日付パース用キーに使う。
     */
    function buildSessionPlanFromTabBundlePayload(j) {
      const lookupRaw = (j.lookup && j.lookup.sessions) || [];
      const lookupSessions = lookupRaw.length
        ? normalizeGasSessions(lookupRaw)
        : null;
      const allEntries = [];
      const sessionsBySheet = new Map();
      const ym0 = currentYmSix();
      const ym1 = ymSixPlusOneMonth(ym0);
      const items = [...(j.sheets || [])].sort(
        (a, b) => (a.tabIndex || 0) - (b.tabIndex || 0),
      );
      for (const item of items) {
        const tabIndex = Number(item.tabIndex) || 0;
        const ymHint = tabIndex === 0 ? ym0 : ym1;
        const recordLayout = Boolean(item.recordLayout);
        let list = normalizeGasSessions(item.sessions || []);
        if (lookupSessions && lookupSessions.length) {
          list = mergeSessionsFromLookup(list, lookupSessions);
        }
        list = [...list].sort((a, b) => Number(a.col) - Number(b.col));
        list = filterSessionsFromTodayOnward(list, ymHint);
        if (!list.length) continue;
        if (!recordLayout && !sessionsPlausibleForSheet(list, ymHint)) continue;
        sessionsBySheet.set(ymHint, list);
        const seenColInSheet = new Set();
        for (const s of list) {
          const dt = s.recordDateParse
            ? parseSessionDateFromCellBest(s.date)
            : parseSessionDateFromCell(s.date, ymHint);
          if (!dt) continue;
          const colKey = `${ymHint}:${s.col}`;
          if (seenColInSheet.has(colKey)) continue;
          seenColInSheet.add(colKey);
          allEntries.push({ sheetName: ymHint, session: s, dt });
        }
      }
      return {
        lookupSessions,
        allEntries,
        sessionsBySheet,
      };
    }

    async function tryBuildSessionPlanFromTabs(includeSecond) {
      const cacheKey = bundleTabCacheKey(includeSecond);
      const cached = await readBundleCache(cacheKey);
      if (cached && cached.tabMode && Array.isArray(cached.sheets)) {
        const fromCache = buildSessionPlanFromTabBundlePayload(cached);
        if (fromCache.sessionsBySheet.size) return fromCache;
      }
      const json = await fetchCsvTabBundleJson(includeSecond);
      if (!json) return null;
      await writeBundleCache(cacheKey, json);
      return buildSessionPlanFromTabBundlePayload(json);
    }

    /** パースした暦月がシート名 YYYYMM の月と一致するか（正しい月タブを優先する） */
    function sessionMatchesSheetMonth(dt, sheetName) {
      const d = startOfLocalDay(dt);
      if (!/^\d{6}$/.test(sheetName)) return false;
      const sm = +sheetName.slice(4, 6);
      return d.getMonth() + 1 === sm;
    }

    /**
     * 日付セル＋場所の重複排除用キー（曜日括弧を除き NFKC・空白除去）。
     * 別年の同じ「5/4」表記が複数月シートに載っているときに二重表示しない。
     */
    function sessionDatePlaceDedupeKey(session) {
      const raw = String(session.date || "")
        .normalize("NFKC")
        .trim();
      const d = raw
        .replace(/\([^)]*\)/g, "")
        .replace(/（[^）]*）/g, "")
        .replace(/\s+/g, "");
      return `${d}\t${normalizeKeyPart(session.place)}`;
    }

    /**
     * 各月シートの列を走査し、本日以降だけを集める。
     * 日付順に並べ、同一「日付セル表記＋場所」は 1 列だけ残す。
     */
    function collectFutureEntriesFromSheets(plan) {
      if (!plan?.sessionsBySheet?.size) return [];
      const today = startOfLocalDay(new Date());
      const sheetOrder = [...plan.sessionsBySheet.keys()].sort((a, b) =>
        a.localeCompare(b),
      );
      const rows = [];
      for (const sheetName of sheetOrder) {
        const sessions = plan.sessionsBySheet.get(sheetName);
        for (const s of sessions) {
          const dt = s.recordDateParse
            ? parseSessionDateFromCellBest(s.date)
            : parseSessionDateFromCell(s.date, sheetName);
          if (!dt) continue;
          if (startOfLocalDay(dt) < today) continue;
          rows.push({ sheetName, session: s, dt });
        }
      }
      rows.sort((a, b) => {
        const ra = Boolean(a.session.recordDateParse);
        const rb = Boolean(b.session.recordDateParse);
        if (!ra && !rb) {
          const ma = sessionMatchesSheetMonth(a.dt, a.sheetName) ? 0 : 1;
          const mb = sessionMatchesSheetMonth(b.dt, b.sheetName) ? 0 : 1;
          if (ma !== mb) return ma - mb;
        }
        const ta = startOfLocalDay(a.dt).getTime();
        const tb = startOfLocalDay(b.dt).getTime();
        if (ta !== tb) return ta - tb;
        const ca = Number(a.session.col);
        const cb = Number(b.session.col);
        if (ca !== cb) return ca - cb;
        return a.sheetName.localeCompare(b.sheetName);
      });
      const seen = new Set();
      const out = [];
      for (const e of rows) {
        const key = sessionDatePlaceDedupeKey(e.session);
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(e);
      }
      out.sort((a, b) => {
        const ta = startOfLocalDay(a.dt).getTime();
        const tb = startOfLocalDay(b.dt).getTime();
        if (ta !== tb) return ta - tb;
        const ca = Number(a.session.col);
        const cb = Number(b.session.col);
        if (ca !== cb) return ca - cb;
        return a.sheetName.localeCompare(b.sheetName);
      });
      return out;
    }

    /**
     * gviz の誤シート返却などで、日付列の暦月がシート名 YYYYMM と著しくずれているときは除外する。
     * パースできた列の過半数がシートの年月と一致するときだけ採用。
     */
    function sessionsPlausibleForSheet(sessions, ymSix) {
      if (!sessions || !sessions.length) return false;
      if (!/^\d{6}$/.test(ymSix)) return false;
      const sy = +ymSix.slice(0, 4);
      const sm = +ymSix.slice(4, 6);
      let parsed = 0;
      let match = 0;
      for (const s of sessions) {
        const dt = parseSessionDateFromCell(s.date, ymSix);
        if (!dt) continue;
        parsed++;
        if (dt.getFullYear() === sy && dt.getMonth() + 1 === sm) match++;
      }
      if (parsed === 0) return false;
      return match * 2 >= parsed;
    }

    /** 今日未満のセッション列を除く（過去日は表示しない） */
    function filterSessionsFromTodayOnward(sessions, sheetName) {
      const today = startOfLocalDay(new Date());
      return sessions.filter((s) => {
        const dt = s.recordDateParse
          ? parseSessionDateFromCellBest(s.date)
          : parseSessionDateFromCell(s.date, sheetName);
        return dt && startOfLocalDay(dt) >= today;
      });
    }

    /**
     * 指定した YYYYMM シートだけ取得（gviz CSV、参加者とマージ）。
     */
    async function buildSessionPlan(sheetIds) {
      const lookupSessions = await fetchLookupSessionsOnce();
      const allEntries = [];
      const sessionsBySheet = new Map();

      for (let i = 0; i < sheetIds.length; i += SHEET_FETCH_CONCURRENCY) {
        const chunk = sheetIds.slice(i, i + SHEET_FETCH_CONCURRENCY);
        const parts = await Promise.all(
          chunk.map((sheetName) =>
            fetchMergedSessionsForSheet(sheetName, lookupSessions).then(
              (sessions) => ({ sheetName, sessions }),
            ),
          ),
        );
        for (const { sheetName, sessions } of parts) {
          const sorted = [...(sessions || [])].sort(
            (a, b) => Number(a.col) - Number(b.col),
          );
          const list = filterSessionsFromTodayOnward(sorted, sheetName);
          if (!list.length) continue;
          if (!sessionsPlausibleForSheet(list, sheetName)) continue;
          sessionsBySheet.set(sheetName, list);
          const seenColInSheet = new Set();
          for (const s of list) {
            const dt = parseSessionDateFromCell(s.date, sheetName);
            if (!dt) continue;
            const colKey = `${sheetName}:${s.col}`;
            if (seenColInSheet.has(colKey)) continue;
            seenColInSheet.add(colKey);
            allEntries.push({ sheetName, session: s, dt });
          }
        }
      }

      return {
        lookupSessions,
        allEntries,
        sessionsBySheet,
      };
    }

    function renderUpcomingAll() {
      if (!sessionPlan) {
        renderSessions([], "読み込み中のデータがありません。");
        return;
      }
      const entries = collectFutureEntriesFromSheets(sessionPlan);
      if (!entries.length) {
        renderSessions([], "今後の予定がありません。");
        return;
      }
      renderSessions(entries.map((e) => e.session));
      scrollSessionsToStart();
    }

    let refreshBundleWired = false;

    function wireRefreshBundleOnce() {
      if (refreshBundleWired || !btnRefreshBundleEl) return;
      refreshBundleWired = true;
      btnRefreshBundleEl.addEventListener("click", async () => {
        btnRefreshBundleEl.disabled = true;
        try {
          setStatus("loading", "データ取得中…");
          await clearBundleCache();
          await initializeFromSpreadsheet();
        } catch (err) {
          setStatus(
            "error",
            "更新に失敗しました。ネットワークを確認してください。",
          );
          console.error(err);
        } finally {
          btnRefreshBundleEl.disabled = false;
        }
      });
    }

    async function initializeFromSpreadsheet() {
      const includeSecond = new Date().getDate() >= 23;
      setStatus(
        "loading",
        includeSecond && String(CSV_TAB2_GID || "").trim() !== ""
          ? "読み込み中…"
          : "読み込み中…",
      );
      const tabPlan = await tryBuildSessionPlanFromTabs(includeSecond);
      if (tabPlan && tabPlan.sessionsBySheet.size) {
        sessionPlan = tabPlan;
        wireRefreshBundleOnce();
        renderUpcomingAll();
        setStatus("hidden", "");
        return;
      }

      const list = await discoverMonthSheets();
      if (!list.length) {
        setStatus(
          "error",
          "表示できる月シート（YYYYMM）がありません。共有設定とシート名を確認してください。",
        );
        return;
      }
      const cur = currentYmSix();
      const toFetch = list
        .filter((ym) => /^\d{6}$/.test(ym) && ym >= cur)
        .sort((a, b) => a.localeCompare(b));

      setStatus("loading", "読み込み中…");
      sessionPlan = await buildSessionPlan(toFetch);

      if (
        !sessionPlan.sessionsBySheet.size &&
        !sessionPlan.allEntries.length
      ) {
        setStatus(
          "error",
          "日付として解釈できる列がありません。日付セルの形式を確認してください。",
        );
        return;
      }
      wireRefreshBundleOnce();
      renderUpcomingAll();
      setStatus("hidden", "");
    }

    async function bootstrap() {
      setStatus("loading", "読み込み中…");
      try {
        await initializeFromSpreadsheet();
      } catch (e) {
        setStatus(
          "error",
          "初期化に失敗しました。ネットワークを確認してください。",
        );
        console.error(e);
      }
    }

    bootstrap();
  </script>
